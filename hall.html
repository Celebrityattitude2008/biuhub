<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>BIU Student Hub — Hall of Fame</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

  <style>
    :root {
      --bg: #f8f9fb;
      --card-bg: #ffffff;
      --text-main: #1a1f36;
      --text-muted: #6b7280;
      --primary: #0017e4;
      --border: #e5e7eb;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --icon-bg: #f3f4f6;
      --evt-assignment: #3b82f6;
      --evt-exam: #ef4444;
      --evt-personal: #f59e0b;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #02338f;
      --border: #334155;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      --icon-bg: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); color: var(--text-main); transition: background 0.3s, color 0.3s; padding-bottom: 100px; }

    .top-header {
      background: var(--primary); color: #ffffff; padding: 30px 20px 40px;
      border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
    }
    .header-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .welcome-text { font-size: 24px; font-weight: 800; }
    .subtitle { font-family: 'Caveat', cursive; font-size: 20px; opacity: 0.9; }
    
    .header-actions { display: flex; gap: 10px; }
    .theme-toggle { 
      background: rgba(255,255,255,0.2); border: none; color: white; 
      width: 40px; height: 40px; border-radius: 50%; display: flex; 
      align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); 
    }

    .hall-container {
      background: var(--card-bg); margin: 20px; border-radius: 20px;
      box-shadow: var(--shadow); padding: 20px; border: 1px solid var(--border);
    }
    .section-title { font-family: 'Caveat', cursive; font-size: 26px; font-weight: 700; margin-bottom: 15px; }

    .contributors-list { display: flex; flex-direction: column; gap: 12px; }
    .contributor-card { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .contributor-info { display: flex; flex-direction: column; }
    .contributor-name { font-weight: 700; font-size: 16px; }
    .contributor-details { font-size: 12px; color: var(--text-muted); }
    .contributor-points { font-weight: 800; font-size: 18px; color: var(--primary); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: #fff;
      display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1); border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 100;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 10px; font-weight: 600; }
    .nav-item.active { color: #fff; }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="header-top-row">
      <div>
        <div class="welcome-text">Hall of Fame</div>
        <div class="subtitle">Recognizing BIU contributors</div>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" onclick="toggleTheme()">
          <span class="material-symbols-rounded" id="themeIcon">dark_mode</span>
        </button>
      </div>
    </div>
  </header>

  <div class="hall-container">
    <div class="section-title">Archived Contributors</div>
    <div class="contributors-list" id="contributorsList">
      <div class="contributor-card">
        <div class="contributor-info">
          <div class="contributor-name">Abuto Ezekiel</div>
          <div class="contributor-details">100 Level • Computer Science</div>
        </div>
        <div class="contributor-points">1 point</div>
      </div>

      <div class="contributor-card">
        <div class="contributor-info">
          <div class="contributor-name">Isiwu Joshua</div>
          <div class="contributor-details">100 Level • Medicine and Surgery</div>
        </div>
        <div class="contributor-points">0 point</div>
      </div>
      <!-- More contributors can be added here -->
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/index.html" class="nav-item">
      <span class="material-symbols-rounded">home</span>
      <span>Home</span>
    </a>
    <a href="/assignment.html" class="nav-item">
      <span class="material-symbols-rounded">assignment</span>
      <span>Assignment</span>
    </a>
    <a href="/subscriptions.html" class="nav-item">
      <span class="material-symbols-rounded">account_balance_wallet</span>
      <span>Budget</span>
    </a>
    <a href="/calendar.html" class="nav-item">
      <span class="material-symbols-rounded">calendar_month</span>
      <span>Schedule</span>
    </a>
    <a href="/profile.html" class="nav-item">
      <span class="material-symbols-rounded">person</span>
      <span>Profile</span>
    </a>
  </nav>

  <script>
    // Theme logic
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';
    }
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      document.getElementById('themeIcon').textContent = newTheme === 'dark' ? 'light_mode' : 'dark_mode';
    }
    initTheme();
  </script>
</body>
</html>
