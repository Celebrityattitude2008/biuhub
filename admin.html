<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Panel — Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --bg: #030712; --card: #111827; --accent: #8b5cf6; --accent-2: #06b6d4;
      --muted: #94a3b8; --border: rgba(255,255,255,0.06); --radius: 18px;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
    }
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; scrollbar-width: thin; }
    body { 
      margin: 0; background: var(--bg); color: #f8fafc; 
      background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.05), transparent);
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
    .brand { display: flex; align-items: center; gap: 15px; }
    .logo { 
      width: 45px; height: 45px; border-radius: 12px; 
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center; font-weight: 900;
      box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
    }
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
    .stat-val { font-size: 24px; font-weight: 800; display: block; }
    .stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
    .list { display: flex; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; padding-right: 8px; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--border); }
    .item.is-banned { border-left: 4px solid var(--danger); }
    .btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 12px 18px; border-radius: 12px; width: 100%; outline: none; }
    .section-title { margin: 0 0 20px; font-size: 13px; color: var(--accent-2); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; }
    #liveMonitor { font-size: 12px; color: var(--success); background: rgba(16, 185, 129, 0.05); padding: 10px; border-radius: 8px; margin-top: 15px; border-left: 3px solid var(--success); }
  </style>
</head>
<body>

<div class="wrap" id="adminGate" style="display:none">
  <header>
    <div class="brand">
      <div class="logo">HUB</div>
      <div>
        <h1 style="margin:0; font-size:24px;">Command Center</h1>
        <div id="adminEmail" style="font-size:12px; color:var(--muted)">Checking...</div>
      </div>
    </div>
    <div style="display:flex; gap:10px;">
      <a href="https://docs.google.com/spreadsheets/d/10PXZ8wp8jVyWQKfvQMVPX8S9h0HTof2SOMZS49pYNuk/edit" target="_blank" class="btn btn-ghost">
        <span class="material-symbols-rounded">table_chart</span> Spreadsheet Unit
      </a>
      <button id="signOut" class="btn btn-danger">Sign Out</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card"><span class="stat-label">Total Users</span><span id="statUsers" class="stat-val">0</span></div>
    <div class="stat-card"><span class="stat-label">Pending Archives</span><span id="statPending" class="stat-val" style="color:var(--warning)">0</span></div>
    <div class="stat-card"><span class="stat-label">Live Broadcast</span><span id="statLive" class="stat-val" style="font-size:14px; color:var(--success)">OFFLINE</span></div>
  </div>

  <div class="card" style="border-top: 3px solid var(--accent-2);">
    <h3 class="section-title">Announcement Broadcast</h3>
    <div style="display: flex; gap: 12px;">
      <input id="broadcastInput" class="input-box" placeholder="Type an alert for all students..." />
      <button id="sendBroadcast" class="btn btn-primary">Push Update</button>
      <button id="clearBroadcast" class="btn btn-danger">Kill</button>
    </div>
    <div id="liveMonitor"><b>Live Message:</b> <span id="currentMsg">None</span></div>
  </div>

  <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap:25px;">
    <div class="card">
      <h3 class="section-title">Archive Requests</h3>
      <div id="assignmentList" class="list"></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 class="section-title" style="margin:0;">Users</h3>
        <input type="text" id="userSearch" class="input-box" placeholder="Search..." style="max-width:150px;">
      </div>
      <div class="list" id="userList"></div>
    </div>
  </div>
</div>

<div id="gateLoading" style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
  <div class="logo">HUB</div>
  <p style="color:var(--muted); font-size:14px;">Authenticating...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
    authDomain: "biu-students-hub.firebaseapp.com",
    projectId: "biu-students-hub",
    databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.database();
  const ADMIN_EMAIL = 'pauladamu600@gmail.com';

  auth.onAuthStateChanged(user => {
    if (user && user.email === ADMIN_EMAIL) {
      document.getElementById('gateLoading').style.display = 'none';
      document.getElementById('adminGate').style.display = 'block';
      document.getElementById('adminEmail').innerText = user.email;
      initDashboard();
    } else if (user) {
      auth.signOut();
    } else {
      window.location.href = 'index.html'; 
    }
  });

  function initDashboard() {
    // BROADCAST
    db.ref('broadcast').on('value', snap => {
      const data = snap.val();
      document.getElementById('currentMsg').innerText = data ? data.message : 'No message active.';
      document.getElementById('statLive').innerText = data ? 'ACTIVE' : 'OFFLINE';
    });

    document.getElementById('sendBroadcast').onclick = () => {
      const msg = document.getElementById('broadcastInput').value;
      if(msg) db.ref('broadcast').set({ message: msg, timestamp: Date.now() });
      document.getElementById('broadcastInput').value = '';
    };
    document.getElementById('clearBroadcast').onclick = () => db.ref('broadcast').remove();

    // ARCHIVES
    db.ref('pendingResources').on('value', snap => {
      document.getElementById('statPending').innerText = snap.numChildren() || 0;
      renderPending(snap);
    });

    // PROFILES (Fixed Loop)
    db.ref('profiles').on('value', snap => {
      const users = [];
      snap.forEach(child => {
        const d = child.val();
        if (child.key !== 'admin' && typeof d === 'object') {
          users.push({
            uid: child.key,
            fullName: d.fullName || "Student",
            email: d.email || "No Email",
            verified: d.verified === true,
            banned: d.banned === true
          });
        }
      });
      window.cachedUsers = users;
      document.getElementById('statUsers').innerText = users.length;
      renderUsers(users);
    });
  }

  function renderUsers(data) {
    const list = document.getElementById('userList');
    list.innerHTML = '';
    data.forEach(u => {
      const div = document.createElement('div');
      div.className = `item ${u.banned ? 'is-banned' : ''}`;
      div.innerHTML = `
        <div style="flex:1">
          <div style="font-weight:700; font-size:13px;">${u.fullName}</div>
          <div style="font-size:11px; color:var(--muted)">${u.email}</div>
        </div>
        <div style="display:flex; gap:8px;">
           <button class="btn btn-ghost" onclick="toggleStatus('${u.uid}', 'verified', ${!u.verified})">${u.verified ? '✅' : '⏳'}</button>
           <button class="btn btn-danger" onclick="toggleStatus('${u.uid}', 'banned', ${!u.banned})">${u.banned ? '🔓' : '🚫'}</button>
        </div>`;
      list.appendChild(div);
    });
  }

  function renderPending(snap) {
    const list = document.getElementById('assignmentList');
    list.innerHTML = '';
    snap.forEach(child => {
      const res = child.val();
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div style="flex:1">
          <div style="font-weight:700; font-size:13px;">${res.title || 'Untitled'}</div>
          <div style="font-size:11px; color:var(--muted)">${res.courseCode || 'N/A'}</div>
        </div>
        <button class="btn btn-danger" onclick="deleteRes('${child.key}')">Discard</button>`;
      list.appendChild(div);
    });
  }

  async function toggleStatus(uid, field, status) {
    await db.ref(`profiles/${uid}/${field}`).set(status);
  }

  async function deleteRes(id) {
    if(confirm("Discard this?")) await db.ref(`pendingResources/${id}`).remove();
  }

  document.getElementById('userSearch').oninput = (e) => {
    const val = e.target.value.toLowerCase();
    const filtered = window.cachedUsers.filter(u => 
      u.fullName.toLowerCase().includes(val) || u.email.toLowerCase().includes(val)
    );
    renderUsers(filtered);
  };

  document.getElementById('signOut').onclick = () => auth.signOut();
</script>
</body>
</html>
