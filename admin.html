<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BIU Student Hub — Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --bg: #071028; --card: #0b1a3d; --accent: #6d28d9; --accent-2: #06b6d4;
      --muted: #9aa8bf; --glass: rgba(255,255,255,0.03); --radius: 14px;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
    }
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { 
      margin: 0; background: var(--bg); color: #e6eef8; 
      background-attachment: fixed; min-height: 100vh;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .brand { display: flex; align-items: center; gap: 15px; }
    .logo { 
      width: 50px; height: 50px; border-radius: 12px; 
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center; font-weight: 800;
    }

    .card { 
      background: var(--card); border-radius: var(--radius); 
      border: 1px solid var(--glass); padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    .list { display: flex; flex-direction: column; gap: 10px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
    
    .item { 
      display: flex; justify-content: space-between; align-items: center; padding: 15px; 
      background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid transparent; transition: 0.2s;
    }
    .item:hover { background: rgba(255,255,255,0.05); }

    .btn { 
      padding: 8px 14px; border-radius: 8px; border: none; font-weight: 700; 
      cursor: pointer; transition: 0.2s; font-size: 11px; display: flex; align-items: center; gap: 5px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-ghost { background: transparent; border: 1px solid var(--glass); color: var(--muted); }

    .badge { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .badge-verify { background: rgba(16, 185, 129, 0.2); color: #10b981; }

    input.search { 
      background: rgba(0,0,0,0.2); border: 1px solid var(--glass); color: white; 
      padding: 10px 15px; border-radius: 10px; width: 100%; outline: none;
    }

    .grid-admin { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
    .section-title { margin: 0 0 15px; font-size: 14px; color: var(--accent-2); text-transform: uppercase; letter-spacing: 1px; font-weight: 800; display: flex; justify-content: space-between; }
  </style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">HUB</div>
      <div>
        <h1 style="margin:0; font-size:22px;">Command Center</h1>
        <div style="font-size:12px; color:var(--muted)">pauladamu600@gmail.com</div>
      </div>
    </div>
    <button id="signOut" class="btn btn-ghost">Sign Out</button>
  </header>

  <div id="authNotice" class="card" style="text-align:center;">Checking Admin Access...</div>

  <div id="mainContent" style="display:none">
    
    <div class="card" style="border-top: 2px solid var(--accent-2);">
        <h3 class="section-title">Global Header Message</h3>
        <div style="display: flex; gap: 10px;">
            <input id="broadcastInput" class="search" placeholder="Broadcast a new announcement to all students..." />
            <button id="sendBroadcast" class="btn btn-primary">Update</button>
            <button id="clearBroadcast" class="btn btn-ghost" style="color:var(--danger)">Clear</button>
        </div>
    </div>

    <div class="grid-admin">
      
      <div class="card">
        <h3 class="section-title">Pending Assignments <span>Uploads</span></h3>
        <div id="assignmentList" class="list">
            <p style="font-size: 12px; color: var(--muted);">No pending assignment uploads.</p>
        </div>
      </div>

      <div class="card">
        <h3 class="section-title">SkillSwap <span>Active Posts</span></h3>
        <div id="skillSwapList" class="list">
            <p style="font-size: 12px; color: var(--muted);">No active project posts.</p>
        </div>
      </div>

    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3 class="section-title" style="margin:0;">User Management</h3>
          <input type="text" id="userSearch" class="search" placeholder="Search by name..." style="max-width:250px;">
      </div>
      <div class="list" id="userList" style="max-height:450px;"></div>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
    authDomain: "biu-students-hub.firebaseapp.com",
    projectId: "biu-students-hub",
    databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.database();

  const ADMIN_EMAIL = 'pauladamu600@gmail.com';

  auth.onAuthStateChanged(user => {
    if (user && user.email === ADMIN_EMAIL) {
      document.getElementById('authNotice').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      loadAdminData();
    } else {
      auth.signOut();
    }
  });

  function loadAdminData() {
    loadAssignments();
    loadSkillSwap();
    loadUsers();
  }

  // --- Broadcast ---
  document.getElementById('sendBroadcast').onclick = () => {
    const msg = document.getElementById('broadcastInput').value.trim();
    if (msg) db.ref('broadcast').set({ message: msg, timestamp: Date.now() });
    document.getElementById('broadcastInput').value = '';
  };
  document.getElementById('clearBroadcast').onclick = () => db.ref('broadcast').remove();

  // --- Assignment Moderation (biuarchive.site) ---
  function loadAssignments() {
    db.ref('pendingResources').on('value', snap => {
      const list = document.getElementById('assignmentList');
      list.innerHTML = '';
      if(!snap.exists()) { list.innerHTML = '<p style="color:var(--muted); font-size:12px;">All clear!</p>'; return; }
      
      snap.forEach(child => {
        const res = child.val();
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div>
            <div style="font-weight:700; font-size:13px;">${res.courseCode}: ${res.courseTitle}</div>
            <a href="${res.driveLink}" target="_blank" style="font-size:11px; color:var(--accent-2);">View Uploaded File</a>
          </div>
          <div style="display:flex; gap:5px;">
            <button class="btn btn-primary" onclick="approveResource('${child.key}')">Publish</button>
            <button class="btn btn-danger" onclick="deleteFromDb('pendingResources', '${child.key}')">Delete</button>
          </div>`;
        list.appendChild(div);
      });
    });
  }

  async function approveResource(id) {
    const snap = await db.ref(`pendingResources/${id}`).once('value');
    await db.ref('liveResources').push(snap.val());
    await db.ref(`pendingResources/${id}`).remove();
    alert("Assignment is now live!");
  }

  // --- SkillSwap Cleanup ---
  function loadSkillSwap() {
    db.ref('skillswap_projects').on('value', snap => {
      const list = document.getElementById('skillSwapList');
      list.innerHTML = '';
      if(!snap.exists()) { list.innerHTML = '<p style="color:var(--muted); font-size:12px;">No posts.</p>'; return; }

      snap.forEach(child => {
        const p = child.val();
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div style="max-width:65%;">
            <div style="font-weight:700; font-size:12px;">${p.title}</div>
            <div style="font-size:10px; color:var(--muted)">By ${p.owner}</div>
          </div>
          <button class="btn btn-danger" onclick="deleteFromDb('skillswap_projects', '${child.key}')">Remove</button>`;
        list.appendChild(div);
      });
    });
  }

  // --- Users ---
  let cachedUsers = [];
  function loadUsers() {
    db.ref('profiles').on('value', snap => {
      cachedUsers = [];
      snap.forEach(u => cachedUsers.push({ uid: u.key, ...u.val() }));
      renderUsers(cachedUsers);
    });
  }

  function renderUsers(data) {
    const list = document.getElementById('userList');
    list.innerHTML = '';
    data.forEach(u => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div>
          <div style="font-weight:700;">${u.fullName || 'User'} ${u.verified ? '<span class="badge badge-verify">Verified</span>' : ''}</div>
          <div style="font-size:11px; color:var(--muted)">${u.email}</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-ghost" onclick="updateUser('${u.uid}', 'verified', ${!u.verified})">${u.verified ? 'Unverify' : 'Verify'}</button>
          <button class="btn btn-danger" onclick="updateUser('${u.uid}', 'banned', ${!u.banned})">${u.banned ? 'Unban' : 'Ban'}</button>
        </div>`;
      list.appendChild(div);
    });
  }

  async function updateUser(uid, field, status) {
    await db.ref(`profiles/${uid}/${field}`).set(status);
  }

  async function deleteFromDb(path, id) {
    if(confirm("Confirm Deletion?")) await db.ref(`${path}/${id}`).remove();
  }

  document.getElementById('userSearch').oninput = (e) => {
    const val = e.target.value.toLowerCase();
    renderUsers(cachedUsers.filter(u => (u.fullName || '').toLowerCase().includes(val)));
  };

  document.getElementById('signOut').onclick = () => auth.signOut();
</script>

</body>
</html>
