<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BIU Hub — Past Questions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --bg: #050b1d; 
      --card: rgba(13, 25, 48, 0.7); 
      --accent: #1e40af; 
      --accent-2: #38bdf8; 
      --muted: #94a3b8; 
      --radius: 20px;
      --border: rgba(56, 189, 248, 0.1);
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.2s ease; }
    
    body {
      margin: 0; padding-bottom: 100px;
      background: radial-gradient(circle at top right, rgba(30, 64, 175, 0.1), transparent), var(--bg);
      color: #f1f5f9; min-height: 100vh;
    }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }

    /* Professional Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px;
      gap: 20px;
    }
    .brand { display: flex; align-items: center; gap: 18px; }
    .logo { 
      width: 60px; height: 60px; border-radius: 16px; 
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
    }
    h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* Control Bar */
    .controls-wrapper {
      background: var(--card); border: 1px solid var(--border); padding: 10px;
      border-radius: 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .search-box { position: relative; flex: 1; min-width: 200px; }
    .search-box input {
      width: 100%; padding: 12px 12px 12px 40px; border-radius: 12px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; outline: none;
    }
    .search-box .material-symbols-rounded {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 20px;
    }
    
    .select-custom {
      padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.3);
      border: 1px solid var(--border); color: #fff; cursor: pointer; outline: none;
    }

    /* Category Tabs */
    .tab-container { display: flex; gap: 10px; margin: 25px 0; overflow-x: auto; padding-bottom: 5px; }
    .tab-btn {
      padding: 10px 22px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); cursor: pointer; white-space: nowrap;
      font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent-2); box-shadow: 0 5px 15px rgba(30, 64, 175, 0.4); }

    /* Course Cards */
    .course-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
    }
    .course-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: space-between;
      backdrop-filter: blur(10px);
    }
    .course-card:hover { transform: translateY(-8px); border-color: var(--accent-2); background: rgba(13, 25, 48, 0.9); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
    
    .card-tag {
      position: absolute; top: 0; right: 0; font-size: 10px; 
      padding: 6px 12px; border-bottom-left-radius: 12px; background: rgba(56, 189, 248, 0.1); color: var(--accent-2);
      font-weight: 800; text-transform: uppercase;
    }

    .course-info h3 { margin: 0; font-size: 20px; font-weight: 800; color: #fff; }
    .course-info p { margin: 8px 0 25px; color: var(--muted); font-size: 15px; line-height: 1.4; }

    .card-actions { display: flex; gap: 10px; }
    .btn-view {
      flex: 1; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(90deg, var(--accent), #1d4ed8);
      color: #fff; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-share {
      width: 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--muted); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .btn-share:hover { color: var(--accent-2); background: rgba(56, 189, 248, 0.1); }

    /* Modal Overlay */
    .upgrade-overlay {
      position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(12px);
      display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px;
    }
    .upgrade-card {
      background: #0d1930; border: 1px solid var(--accent-2); padding: 40px; border-radius: 30px;
      max-width: 480px; text-align: center; box-shadow: 0 0 50px rgba(56, 189, 248, 0.15);
    }

    @media (max-width: 768px) {
      header { flex-direction: column; text-align: center; }
      .controls-wrapper { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">BIU</div>
        <div>
          <h1>Past Questions</h1>
          <div class="sub">Verified 100L Database</div>
        </div>
      </div>
      <div class="controls-wrapper">
        <div class="search-box">
          <span class="material-symbols-rounded">search</span>
          <input type="text" id="searchInput" placeholder="Search code or name...">
        </div>
        <select id="levelSelect" class="select-custom">
          <option value="100">100L</option>
          <option value="200">200L</option>
          <option value="300">300L</option>
          <option value="400">400L</option>
        </select>
        <select id="semesterSelect" class="select-custom">
          <option value="1">Sem 1</option>
          <option value="2">Sem 2</option>
        </select>
      </div>
    </header>

    <div class="tab-container">
      <button class="tab-btn active" data-filter="all">All Content</button>
      <button class="tab-btn" data-filter="cat-gst">GST / IDS</button>
      <button class="tab-btn" data-filter="cat-sci">Science & Math</button>
      <button class="tab-btn" data-filter="cat-dept">Departmental</button>
    </div>

    <div class="course-grid" id="courseList">
      </div>
  </div>

  <div id="upgradeOverlay" class="upgrade-overlay">
    <div class="upgrade-card">
      <span class="material-symbols-rounded" style="font-size: 70px; color: var(--accent-2); margin-bottom: 20px;">rocket_launch</span>
      <h2>System Upgrade</h2>
      <p style="color: var(--muted); line-height: 1.6; font-size: 15px;">We're currently migrating the database for other levels. 100L Semester 1 is the only active archive for today.</p>
      <button class="btn-view" style="width: 100%; margin-top: 25px;" onclick="closeOverlay()">Understood</button>
    </div>
  </div>

  <script>
  // 1. Updated Data with 'sem' property
    const courseData = [
        // --- Semester 1 ---
        { code: 'GST 111', name: 'Communication English', cat: 'cat-gst', sem: '1', link: 'https://docs.google.com/document/d/1cICV9V2Wtywaofp_1cA84ItLXu-vve-p/edit' },
        { code: 'GST 112', name: 'People and Culture', cat: 'cat-gst', sem: '1', link: 'https://drive.google.com/file/d/1o290W5ofDBxyoik0WC-y-VdjyHUqylJN/view' },
        { code: 'IDS 111', name: 'Rudiments of Faith', cat: 'cat-gst', sem: '1', link: 'https://docs.google.com/document/d/1dYTcgJQBICb8L5ZNvX4z_nb6H2d7Pd_M/edit' },
        { code: 'MTH 111', name: 'General Mathematics', cat: 'cat-sci', sem: '1', link: 'https://docs.google.com/document/d/1IHjwn7HRnlUoypBEOJL2-k_u0ptZ8GEq/edit' },
        { code: 'MTH 112', name: 'Elementary Statistics', cat: 'cat-sci', sem: '1', link: 'https://docs.google.com/document/d/1jFZFlzQvHxNbnzY35d19kOoOGLX6NxyF/edit' },
        { code: 'CSC 113', name: 'Intro Programming II', cat: 'cat-sci', sem: '1', link: 'https://docs.google.com/document/d/1QJxLjtQTpA1AHVFRgEfwe24QPZPHGti-/edit' },
        { code: 'CHM 111', name: 'General Chemistry I', cat: 'cat-sci', sem: '1', link: 'https://drive.google.com/file/d/1w8e61Q8bRlr3mnwR_ELex5n-tTeOsi8k/view' },
        { code: 'CSC 111', name: 'Intro to Computer Science', cat: 'cat-dept', sem: '1', link: 'https://docs.google.com/document/d/1tGh6b6NQTMQoF_IpiMb6HY-xQ5HrsPyf/view' },
        { code: 'CHM 113', name: 'Organic & Inorganic Basics', cat: 'cat-sci', sem: '1', link: 'https://drive.google.com/file/d/1YQTm7bRCGPls4Q0SaGnGA57cPOCXhPB3/view' },
        { code: 'ZOO 111', name: 'Introductory Zoology', cat: 'cat-sci', sem: '1', link: 'https://drive.google.com/file/d/1d5X3OVPWjmrQhd1ybgulCBHZEqgvvbSp/view' },
    
        // --- Semester 2 (New Additions) ---
        { code: 'CSC 121', name: 'Intro to Web Programming', cat: 'cat-sci', sem: '2', link: 'https://docs.google.com/document/d/1ktzpZwUGPHUCS3xS9baz6DJjfW9HhEHN/edit?usp=sharing&ouid=111271384522252483913&rtpof=true&sd=true' },
        { code: 'GST 112', name: 'People and Culture (Sem 2)', cat: 'cat-gst', sem: '2', link: 'https://docs.google.com/document/d/1CBOGTnI6hyJY3zN3zqy2gNCwEx5Jy-oz/edit?usp=sharing&ouid=111271384522252483913&rtpof=true&sd=true' },
        { code: 'MTH 121', name: 'Vector and Algebra', cat: 'cat-sci', sem: '2', link: 'https://drive.google.com/file/d/1AmB8JoLIm_kQW_FZsd2M01xp8nCLpSrr/view?usp=sharing' },
        { code: 'IDS 111', name: 'Rudiments of Faith (Sem 2)', cat: 'cat-gst', sem: '2', link: 'https://docs.google.com/document/d/12mf92g4L9O-N_BkGYZw95HCSZhgJyyG_/edit?usp=sharing&ouid=111271384522252483913&rtpof=true&sd=true' },
        { code: 'PHY 121', name: 'General Physics II', cat: 'cat-sci', sem: '2', link: 'https://docs.google.com/document/d/1sZJDyBbsMon5_GQXlmWSMcotv3zzxOEN/edit?usp=sharing&ouid=111271384522252483913&rtpof=true&sd=true' },
        { code: 'CHM 123', name: 'Chemistry', cat: 'cat-sci', sem: '2', link: 'https://docs.google.com/document/d/1OXboD_cCXPzoZJGTzfc1ZNC-sRpdYo8B/edit?usp=drivesdk&ouid=111271384522252483913&rtpof=true&sd=true' },
        { code: 'BOT 121', name: 'Botany', cat: 'cat-sci', sem: '2', link: 'https://drive.google.com/file/d/1j10ipkxjVgOFL9gMNPg9YvyoWbH7RKqh/view?usp=drivesdk' },
        { code: 'ZOO 121', name: 'Zoology', cat: 'cat-sci', sem: '2', link: 'https://drive.google.com/file/d/15POUfK8YNDebXcue6poOdvZk1UMwpXM6/view?usp=sharing' },
      ];
    
    const courseList = document.getElementById('courseList');
    const searchInput = document.getElementById('searchInput');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const levelSelect = document.getElementById('levelSelect');
    const semesterSelect = document.getElementById('semesterSelect');
    const overlay = document.getElementById('upgradeOverlay');
    
    // 2. Updated Render Function to include Semester filter
    function render(filter = 'all', query = '') {
        const currentSemester = semesterSelect.value; // Get sem 1 or 2 from dropdown
        courseList.innerHTML = '';
        
        const filtered = courseData.filter(c => {
            const matchesSem = c.sem === currentSemester;
            const matchesTab = filter === 'all' || c.cat === filter;
            const matchesSearch = c.code.toLowerCase().includes(query) || c.name.toLowerCase().includes(query);
            return matchesSem && matchesTab && matchesSearch;
        });
    
        if(filtered.length === 0) {
            courseList.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--muted)">No content found for this selection.</div>`;
            return;
        }
    
filtered.forEach(c => {
  const card = document.createElement('div');
  card.className = 'course-card';
  card.innerHTML = `
    <div class="card-tag">${c.cat.split('-')[1]}</div>
    <div class="course-info">
      <h3>${c.code}</h3>
      <p>${c.name}</p>
    </div>
    <div class="card-actions">
      <button class="btn-view" onclick="window.open('${c.link}', '_blank')">
        <span class="material-symbols-rounded">visibility</span> View PQ
      </button>
      <button class="btn-share" onclick="copyLink('${c.link}')" title="Copy Link">
        <span class="material-symbols-rounded">content_copy</span>
      </button>
    </div>
  `;
  courseList.appendChild(card);
});
}
    
    // 3. Updated checkRedirect to allow 100L Semester 2
    function checkRedirect() {
        // Only show overlay if Level is NOT 100
        if (levelSelect.value !== '100') {
            overlay.style.display = 'flex';
        } else {
            // If it is 100L (either semester), just re-render
            render(document.querySelector('.tab-btn.active').dataset.filter, searchInput.value.toLowerCase());
        }
    }
    
    function closeOverlay() {
        overlay.style.display = 'none';
        levelSelect.value = '100';
        render();
    }
    
    // Event Listeners (Kept original logic)
    searchInput.addEventListener('input', (e) => {
        const activeFilter = document.querySelector('.tab-btn.active').dataset.filter;
        render(activeFilter, e.target.value.toLowerCase());
    });
    
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(btn.dataset.filter, searchInput.value.toLowerCase());
        });
    });
    
    levelSelect.addEventListener('change', checkRedirect);
    semesterSelect.addEventListener('change', () => {
        render(document.querySelector('.tab-btn.active').dataset.filter, searchInput.value.toLowerCase());
    });
    
    function copyLink(url) {
        navigator.clipboard.writeText(url);
        alert('Link copied! You can now share it with friends.');
    }
    
    // Initial load
    render();
  </script>
</body>
</html>
