<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Subscriptions — BIU Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --bg: #050b1d; 
      --card: rgba(13, 25, 48, 0.7); 
      --accent: #6d28d9; 
      --accent-2: #06b6d4; 
      --muted: #94a3b8; 
      --radius: 20px;
      --border: rgba(255, 255, 255, 0.05);
      --danger: #ef4444; 
      --success: #10b981;
    }
    
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body { 
      margin: 0; background: var(--bg); color: #f1f5f9; 
      min-height: 100vh; padding-bottom: 100px;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(109, 40, 217, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.08), transparent 25%);
    }

    .container { max-width: 500px; margin: 0 auto; padding: 20px; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 10px; }
    .back-btn { 
      color: var(--muted); text-decoration: none; font-size: 14px; 
      display: flex; align-items: center; gap: 5px; transition: color 0.2s;
    }
    .back-btn:hover { color: #fff; }

    .brand {
      font-weight: 800; font-size: 18px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .total-card {
      background: linear-gradient(135deg, rgba(109, 40, 217, 0.9), rgba(6, 182, 212, 0.9));
      padding: 35px 30px; border-radius: 24px; text-align: center; margin-bottom: 30px;
      box-shadow: 0 20px 40px rgba(109, 40, 217, 0.25);
      position: relative; overflow: hidden;
    }
    .total-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>');
      opacity: 0.05; pointer-events: none;
    }
    .total-card p { margin: 0; font-size: 14px; font-weight: 600; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
    .total-card h2 { margin: 10px 0 0; font-size: 42px; font-weight: 800; letter-spacing: -1px; }

    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

    .sub-list { display: flex; flex-direction: column; gap: 15px; }
    
    .sub-item {
      background: var(--card); padding: 20px; border-radius: var(--radius);
      display: flex; justify-content: space-between; align-items: center;
      border: 1px solid var(--border);
      animation: fadeIn 0.4s ease; transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .sub-item:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.1); }
    
    /* Reminder Highlight */
    .sub-item.urgent {
      border-color: rgba(239, 68, 68, 0.4);
      background: linear-gradient(145deg, var(--card), rgba(239, 68, 68, 0.05));
    }

    .status-badge {
      font-size: 10px; text-transform: uppercase; padding: 4px 8px;
      border-radius: 6px; margin-left: 10px; font-weight: 800; 
      background: rgba(239, 68, 68, 0.2); color: var(--danger); letter-spacing: 0.5px;
    }

    @keyframes fadeIn { from{opacity:0; transform: translateY(10px);} to{opacity:1; transform:0;} }

    .sub-name { font-weight: 700; font-size: 16px; display: flex; align-items: center; margin-bottom: 4px; }
    .sub-date { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .sub-price { font-weight: 800; font-size: 18px; color: #fff; margin-bottom: 10px; }

    .action-group { display: flex; align-items: center; justify-content: flex-end; gap: 12px; }

    .renew-btn {
      background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); 
      border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .renew-btn:hover { background: var(--success); color: white; }

    .delete-btn {
      background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; padding: 6px 0; transition: color 0.2s; display: flex; align-items: center; gap: 4px;
    }
    .delete-btn:hover { color: var(--danger); }

    /* FAB & Modal */
    .fab {
      position: fixed; bottom: 30px; right: 50%; transform: translateX(50%);
      width: 60px; height: 60px; border-radius: 20px; 
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center; font-size: 28px;
      box-shadow: 0 10px 25px rgba(109,40,217,0.4); border: none; color: white; cursor: pointer; 
      z-index: 100; transition: transform 0.2s;
    }
    .fab:hover { transform: translateX(50%) scale(1.05); }
    @media (min-width: 540px) {
        .fab { right: calc(50% - 220px); transform: none; }
        .fab:hover { transform: scale(1.05); }
    }

    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 11, 29, 0.85); display: none; align-items: center; justify-content: center; 
      z-index: 1000; backdrop-filter: blur(8px); padding: 20px;
    }
    .modal-content {
      background: rgba(13, 25, 48, 0.95); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px;
      border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    
    input {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); 
      color: white; font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent-2); }
    
    /* Customizing the date picker icon for dark mode */
    ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }

    .save-btn {
      width: 100%; padding: 16px; border-radius: 14px; 
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: white; border: none; font-weight: 800; font-size: 15px;
      margin-top: 15px; cursor: pointer; transition: opacity 0.2s;
    }
    .save-btn:hover { opacity: 0.9; }

    .cancel-btn {
      width: 100%; margin-top: 15px; background: transparent; border: 1px solid var(--border); 
      color: var(--muted); padding: 14px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .cancel-btn:hover { background: rgba(255,255,255,0.05); color: white; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <a href="/index.html" class="back-btn">
      <span class="material-symbols-rounded" style="font-size: 18px;">arrow_back</span> Home
    </a>
    <div class="brand">SubScout</div>
  </header>

  <div class="total-card">
    <p>Total Monthly Spend</p>
    <h2 id="totalDisplay">₦0</h2>
  </div>

  <div class="section-title">
    <span class="material-symbols-rounded" style="color: var(--accent-2);">account_balance_wallet</span>
    Active Subscriptions
  </div>

  <div class="sub-list" id="subContainer">
    <p style="text-align:center; color:var(--muted); padding: 30px 0;">Loading your subscriptions...</p>
  </div>

  <button class="fab" onclick="toggleModal(true)">
    <span class="material-symbols-rounded">add</span>
  </button>
</div>

<div class="modal" id="subModal">
  <div class="modal-content">
    <h3 style="margin-top:0; margin-bottom: 25px; font-size: 20px; text-align: center;">Add Subscription</h3>
    
    <div class="input-group">
      <label>Service Name</label>
      <input type="text" id="subName" placeholder="e.g. Netflix, Spotify">
    </div>
    
    <div class="input-group">
      <label>Monthly Cost (₦)</label>
      <input type="number" id="subPrice" placeholder="0.00">
    </div>
    
    <div class="input-group">
      <label>Next Billing Date</label>
      <input type="date" id="subDate">
    </div>

    <button class="save-btn" id="saveBtn">Save Subscription</button>
    <button class="cancel-btn" onclick="toggleModal(false)">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // ... [Keep your existing JavaScript code exactly as it was] ...
  const firebaseConfig = {
    apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
    authDomain: "biu-students-hub.firebaseapp.com",
    projectId: "biu-students-hub",
    databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com",
    appId: "1:128818531382:web:190dc5688d1b9d21321c97"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  let currentUser = null;

  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      loadUserSubscriptions();
    } else {
      window.location.href = '/login.html';
    }
  });

  // Helper: Check for 48-hour window
  function getRenewalStatus(dateString) {
    const target = new Date(dateString);
    const now = new Date();
    const diffTime = target - now;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    if (diffDays <= 2) return "urgent"; 
    return "safe";
  }

  function loadUserSubscriptions() {
    const subRef = db.ref('user_subscriptions/' + currentUser.uid);
    subRef.on('value', (snapshot) => {
      const container = document.getElementById('subContainer');
      const totalDisplay = document.getElementById('totalDisplay');
      container.innerHTML = '';
      let total = 0;

      if (!snapshot.exists()) {
        container.innerHTML = `
          <div style="text-align:center; padding: 40px 0; opacity: 0.5;">
            <span class="material-symbols-rounded" style="font-size: 48px; margin-bottom: 10px;">receipt_long</span>
            <p style="margin:0; font-size: 14px;">No subscriptions added yet.</p>
          </div>`;
        totalDisplay.innerText = "₦0";
        return;
      }

      snapshot.forEach(child => {
        const data = child.val();
        const id = child.key;
        total += parseInt(data.price);
        
        const isUrgent = getRenewalStatus(data.date) === "urgent";
        
        container.innerHTML += `
          <div class="sub-item ${isUrgent ? 'urgent' : ''}">
            <div>
              <div class="sub-name">
                ${data.name} ${isUrgent ? '<span class="status-badge">Due Soon</span>' : ''}
              </div>
              <div class="sub-date">
                <span class="material-symbols-rounded" style="font-size: 14px;">event</span> 
                Renew: ${data.date}
              </div>
            </div>
            <div style="text-align: right">
              <div class="sub-price">₦${parseInt(data.price).toLocaleString()}</div>
              <div class="action-group">
                <button class="renew-btn" onclick="renewSub('${id}', '${data.date}')">Mark Paid</button>
                <button class="delete-btn" onclick="deleteSub('${id}')">
                  <span class="material-symbols-rounded" style="font-size: 16px;">delete</span>
                </button>
              </div>
            </div>
          </div>
        `;
      });
      totalDisplay.innerText = "₦" + total.toLocaleString();
    });
  }

  // Action: Renew for next month
  async function renewSub(id, currentDate) {
    const d = new Date(currentDate);
    d.setMonth(d.getMonth() + 1);
    const nextDate = d.toISOString().split('T')[0];
    
    try {
      await db.ref('user_subscriptions/' + currentUser.uid + '/' + id).update({ date: nextDate });
    } catch (e) { alert(e.message); }
  }

  // Action: Delete sub
  async function deleteSub(id) {
    if(confirm("Remove this subscription?")) {
      await db.ref('user_subscriptions/' + currentUser.uid + '/' + id).remove();
    }
  }

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const name = document.getElementById('subName').value;
    const price = document.getElementById('subPrice').value;
    const date = document.getElementById('subDate').value;

    if (!name || !price || !date) return alert("Fill all fields");

    // UX Enhancement: Show loading state on button
    const btn = document.getElementById('saveBtn');
    btn.innerText = "Saving...";
    btn.disabled = true;

    try {
      await db.ref('user_subscriptions/' + currentUser.uid).push({ name, price, date });
      toggleModal(false);
      document.getElementById('subName').value = '';
      document.getElementById('subPrice').value = '';
      // Keep date for easy entry of multiple subs on same day
    } catch (e) { 
      alert(e.message); 
    } finally {
      btn.innerText = "Save Subscription";
      btn.disabled = false;
    }
  });

  function toggleModal(show) {
    document.getElementById('subModal').style.display = show ? 'flex' : 'none';
  }
</script>
</body>
</html>
