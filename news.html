<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BIU Student Hub — News Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --bg: #030712; 
      --surface: rgba(30, 41, 59, 0.4);
      --accent: #8b5cf6; 
      --accent-2: #0ea5e9; 
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --danger: #ef4444;
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      background-image: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center;
    }

    .container { width: 100%; max-width: 650px; }

    .header { margin: 40px 0; text-align: center; }
    .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0; }
    .header p { color: var(--muted); margin-top: 8px; }

    #newsFeed { display: flex; flex-direction: column; gap: 20px; margin-bottom: 80px; }
    
    .news-card {
      background: var(--surface); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--border); border-radius: 18px; padding: 24px;
      position: relative; transition: 0.3s; animation: slideUp 0.5s ease forwards;
    }
    
    .news-tag {
      display: inline-block; padding: 4px 10px; border-radius: 6px; background: rgba(139, 92, 246, 0.2);
      color: var(--accent); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px;
    }

    .delete-btn {
      position: absolute; top: 20px; right: 20px; background: rgba(239, 68, 68, 0.1);
      color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px;
      padding: 6px; cursor: pointer; display: flex; align-items: center; transition: 0.2s;
    }
    .delete-btn:hover { background: var(--danger); color: white; }

    .news-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; padding-right: 40px; }
    .news-content { color: var(--muted); font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
    .news-meta { margin-top: 15px; font-size: 12px; color: #64748b; border-top: 1px solid var(--border); padding-top: 15px; }

    /* Admin Section */
    .admin-section { margin-top: auto; width: 100%; border-top: 1px solid var(--border); padding: 40px 0; display: none; }
    .admin-card { background: rgba(0,0,0,0.3); border: 1px dashed var(--accent); border-radius: 16px; padding: 20px; }
    input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: white; margin-bottom: 10px; outline: none; }
    .post-btn { background: var(--accent); border: none; color: white; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }

    .empty-state { text-align: center; padding: 40px; color: var(--muted); }
  </style>
</head>
<body>

  <div class="container">
    <header class="header">
      <h1>Campus Updates</h1>
      <p>Latest news and announcements from BIU</p>
    </header>

    <div id="newsFeed">
      <div class="empty-state">Loading updates...</div>
    </div>

    <div class="admin-section" id="adminSection">
      <div class="admin-card">
        <h3 style="font-size: 14px; color: var(--accent); margin-bottom: 15px;">ADMIN CONTROL</h3>
        <form id="adminForm">
          <input type="text" id="postTag" placeholder="Tag (e.g. EXAMS)" required>
          <input type="text" id="postTitle" placeholder="Headline" required>
          <textarea id="postContent" rows="4" placeholder="Update message..." required></textarea>
          <button type="submit" class="post-btn" id="postBtn">Publish Now</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
      authDomain: "biu-students-hub.firebaseapp.com",
      projectId: "biu-students-hub",
      databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com",
      appId: "1:128818531382:web:190dc5688d1b9d21321c97"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let isAdmin = false;

    // Check Admin Status
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const snap = await db.ref('profiles/' + user.uid).once('value');
        const profile = snap.val();
        if (profile && profile.role === 'admin') {
          isAdmin = true;
          document.getElementById('adminSection').style.display = 'block';
        }
      }
      loadNews(); // Always load news regardless of status
    });

    // Load News
    function loadNews() {
      db.ref('news').orderByChild('timestamp').on('value', (snapshot) => {
        const newsFeed = document.getElementById('newsFeed');
        newsFeed.innerHTML = "";
        const posts = [];
        
        snapshot.forEach(child => {
          posts.push({ id: child.key, ...child.val() });
        });

        if (posts.length === 0) {
          newsFeed.innerHTML = '<div class="empty-state">No updates yet.</div>';
          return;
        }

        posts.reverse().forEach(post => {
          const date = new Date(post.timestamp).toLocaleDateString('en-GB', {
            day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
          });

          const card = document.createElement('div');
          card.className = 'news-card';
          card.innerHTML = `
            <span class="news-tag">${post.category}</span>
            ${isAdmin ? `<button class="delete-btn" onclick="deletePost('${post.id}')"><span class="material-symbols-rounded">delete</span></button>` : ''}
            <div class="news-title">${post.title}</div>
            <div class="news-content">${post.content}</div>
            <div class="news-meta">Posted on ${date} • by ${post.postedBy}</div>
          `;
          newsFeed.appendChild(card);
        });
      });
    }

    // Delete Post Function
    async function deletePost(postId) {
      if (confirm("Delete this post? This cannot be undone.")) {
        try {
          await db.ref('news/' + postId).remove();
        } catch (err) {
          alert("Error deleting: " + err.message);
        }
      }
    }

    // Admin Post Logic
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('postBtn');
      btn.disabled = true;

      const postData = {
        category: document.getElementById('postTag').value.toUpperCase(),
        title: document.getElementById('postTitle').value,
        content: document.getElementById('postContent').value,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        postedBy: auth.currentUser.displayName || "Admin"
      };

      try {
        await db.ref('news').push(postData);
        document.getElementById('adminForm').reset();
      } catch (err) {
        alert("Failed to post: " + err.message);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
