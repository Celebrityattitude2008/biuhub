<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BIU Student Hub — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --bg: #030712; 
      --surface: #0f172a; 
      --accent: #8b5cf6; 
      --accent-glow: rgba(139, 92, 246, 0.5);
      --accent-2: #0ea5e9; 
      --muted: #94a3b8;
      --text: #f8fafc;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    html, body {
      height: 100%; margin: 0; 
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(14, 165, 233, 0.1) 0%, transparent 40%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
    }

    .wrap { width: 100%; max-width: 1100px; padding: 20px; display: flex; justify-content: center; }

    .card {
      width: 100%;
      border-radius: var(--radius-lg);
      display: grid; grid-template-columns: 1fr 450px;
      background: rgba(15, 23, 42, 0.6);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      overflow: hidden;
      transform: translateY(20px); opacity: 0;
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardEnter { to { transform: translateY(0); opacity: 1; } }

    /* Left side (Hero) */
    .hero {
      padding: 60px; display: flex; flex-direction: column; justify-content: center;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.05) 0%, transparent 100%);
      border-right: 1px solid var(--border);
    }
    
    .logo-box {
      width: 60px; height: 60px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; font-size: 20px;
      box-shadow: 0 10px 25px var(--accent-glow);
      margin-bottom: 24px;
    }

    h1 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
    .lead { margin: 20px 0 32px; color: var(--muted); font-size: 17px; line-height: 1.6; }

    .features { display: flex; flex-wrap: wrap; gap: 12px; }
    .chip {
      background: rgba(255, 255, 255, 0.04); padding: 10px 18px; border-radius: 100px;
      font-size: 13px; font-weight: 600; border: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .chip span { color: var(--accent-2); font-size: 18px; }

    /* Right side (Form) */
    .form-side { padding: 50px; display: flex; flex-direction: column; justify-content: center; background: rgba(0,0,0,0.1); }
    
    .input-group { margin-bottom: 18px; }
    label { font-size: 13px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 8px; }
    
    input, select {
      width: 100%; padding: 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: rgba(0, 0, 0, 0.3);
      color: white; font-size: 15px; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }

    .btn {
      width: 100%; padding: 15px; border-radius: var(--radius-sm); border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white; font-weight: 700; font-size: 16px; cursor: pointer;
      transition: 0.3s; margin-top: 10px;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .google-btn {
      width: 100%; padding: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: white; color: #0f172a; font-weight: 700; display: flex; 
      align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-top: 15px;
    }

    .divider { display: flex; align-items: center; color: var(--muted); font-size: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); margin: 0 10px; }

    /* Payment Area */
    .pay-box {
      margin-top: 20px; padding: 15px; border-radius: var(--radius-md);
      background: rgba(139, 92, 246, 0.05); border: 1px dashed rgba(139, 92, 246, 0.3);
    }
    .pay-instructions { display: none; margin-top: 12px; font-size: 13px; color: var(--muted); line-height: 1.5; }
    .pay-instructions.show { display: block; }
    
    .footer-link { text-align: center; margin-top: 25px; font-size: 14px; color: var(--muted); }
    .footer-link a { color: var(--accent-2); text-decoration: none; font-weight: 700; }

    /* RESPONSIVE */
    @media (max-width: 950px) {
      .card { grid-template-columns: 1fr; max-width: 550px; }
      .hero { padding: 40px; border-right: none; border-bottom: 1px solid var(--border); text-align: center; }
      .logo-box { margin: 0 auto 20px; }
      .features { justify-content: center; }
      .form-side { padding: 40px; }
    }
    @media (max-width: 500px) {
      .hero, .form-side { padding: 30px 20px; }
      h1 { font-size: 26px; }
      .card { border-radius: 0; border: none; }
      body { align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="card">
      <section class="hero">
        <div class="logo-box">BIU</div>
        <h1>Join the Student Hub</h1>
        <p class="lead">The all-in-one platform for Benson Idahosa University students to study, connect, and excel.</p>
        <div class="features">
          <div class="chip"><span class="material-symbols-rounded">auto_stories</span> Resources</div>
          <div class="chip"><span class="material-symbols-rounded">verified</span> Verified</div>
          <div class="chip"><span class="material-symbols-rounded">groups</span> Community</div>
        </div>
      </section>

      <section class="form-side">
        <form id="signupForm">
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
          </div>
          <div class="input-group">
            <label>School Email</label>
            <input type="email" id="email" placeholder="you@students.biu.edu.ng" required>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 100px; gap: 10px;">
            <div class="input-group">
              <label>Password</label>
              <input type="password" id="password" placeholder="Min 8 chars" required>
            </div>
            <div class="input-group">
              <label>Level</label>
              <select id="level">
                <option>100L</option>
                <option>200L</option>
                <option>300L</option>
                <option>400L</option>
              </select>
            </div>
          </div>

          <div id="feedback" style="margin-bottom: 15px;"></div>

          <button type="submit" class="btn" id="createBtn">Create Account</button>
          
          <div class="divider">OR</div>

          <button type="button" class="google-btn" id="googleSignIn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>

          <div class="pay-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span style="font-size: 13px; font-weight: 700;">Verified Badge (Optional)</span>
              <button type="button" class="btn ghost" id="showPay" style="width: auto; padding: 5px 10px; font-size: 11px; margin:0; border: 1px solid var(--accent);">₦1,000</button>
            </div>
            <div id="payInstructions" class="pay-instructions">
              Send ₦1,000 to: <br>
              <strong>7041795388 • Opay • Paul Adamu</strong> <br>
              <button type="button" id="copyAcc" style="background: none; border: none; color: var(--accent-2); cursor: pointer; padding: 0; font-size: 12px; margin-top: 5px;">Copy Account Number</button>
            </div>
          </div>
        </form>

        <div class="footer-link">
          Already have an account? <a href="/login.html">Sign In</a>
        </div>
      </section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
      authDomain: "biu-students-hub.firebaseapp.com",
      projectId: "biu-students-hub",
      databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com",
      appId: "1:128818531382:web:190dc5688d1b9d21321c97"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const form = document.getElementById('signupForm');
    const feedback = document.getElementById('feedback');
    const createBtn = document.getElementById('createBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const level = document.getElementById('level').value;

      createBtn.disabled = true;
      createBtn.textContent = "Processing...";

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await db.ref('profiles/' + cred.user.uid).set({
          fullName: name,
          email: email,
          level: level,
          verified: false,
          createdAt: Date.now()
        });
        window.location.href = '/index.html';
      } catch (err) {
        feedback.innerHTML = `<span style="color:var(--danger); font-size:12px;">${err.message}</span>`;
        createBtn.disabled = false;
        createBtn.textContent = "Create Account";
      }
    });

    // Google Sign In
    document.getElementById('googleSignIn').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        const snapshot = await db.ref('profiles/' + user.uid).once('value');
        if (!snapshot.exists()) {
          await db.ref('profiles/' + user.uid).set({
            fullName: user.displayName,
            email: user.email,
            level: '100L',
            verified: false,
            createdAt: Date.now()
          });
        }
        window.location.href = '/index.html';
      } catch (err) {
        alert(err.message);
      }
    });

    // Toggle Payment
    document.getElementById('showPay').addEventListener('click', () => {
      document.getElementById('payInstructions').classList.toggle('show');
    });

    document.getElementById('copyAcc').addEventListener('click', () => {
      navigator.clipboard.writeText('7041795388');
      alert('Account number copied!');
    });
  </script>
</body>
</html>
