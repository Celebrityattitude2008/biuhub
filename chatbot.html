<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study AI — BIU Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #f8f9fb;
      --card-bg: #ffffff;
      --text-main: #1a1f36;
      --text-muted: #6b7280;
      --primary: #6d28d9;
      --border: #e5e7eb;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --glass: rgba(0, 0, 0, 0.05);
      --bot-msg: #f3f4f6;
    }

    [data-theme="dark"] {
      --bg: #071028;
      --card-bg: #0b1a3d;
      --text-main: #e6eef8;
      --text-muted: #9aa8bf;
      --primary: #7c3aed;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      --glass: rgba(255,255,255,0.05);
      --bot-msg: #162447;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); color: var(--text-main); transition: 0.3s; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header Styling */
    header {
      background: var(--primary); color: #fff; padding: 20px;
      border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: var(--shadow);
    }
    .header-info { display: flex; align-items: center; gap: 12px; }
    .back-btn { color: white; text-decoration: none; font-size: 20px; font-weight: bold; }
    .status-dot { width: 10px; height: 10px; background: #94a3b8; border-radius: 50%; }
    
    .theme-toggle {
      background: rgba(255,255,255,0.2); border: none; color: white; 
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }

    /* Broadcast Banner */
    #broadcastBanner {
      display: none; background: #06b6d4; color: white; padding: 8px 20px;
      text-align: center; font-size: 12px; font-weight: 600;
    }

    /* Chat Area */
    #chatWindow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 4px; color: var(--text-main); }
    .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }

    /* Quick Actions */
    #quickActions {
      padding: 10px 20px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
    }
    .action-chip {
      padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text-main); font-size: 12px; cursor: pointer; white-space: nowrap; transition: 0.2s;
    }
    .action-chip:hover { border-color: var(--primary); background: var(--primary); color: white; }

    /* Input Area */
    .input-area { padding: 15px 20px; background: var(--card-bg); border-top: 1px solid var(--border); display: flex; gap: 10px; }
    input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; color: var(--text-main); outline: none; }
    .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 12px; color: white; cursor: pointer; }

    .typing { font-size: 12px; color: var(--text-muted); padding: 5px 25px; display: none; }
  </style>
</head>
<body data-theme="dark">

<div id="broadcastBanner"><span id="broadcastText"></span></div>

<header>
  <div class="header-info">
    <a href="index.html" class="back-btn">←</a>
    <div>
      <div style="font-weight: 700; display: flex; align-items: center; gap: 8px;">
        Study Assistant <div id="statusDot" class="status-dot"></div>
      </div>
      <div id="statusText" style="font-size: 11px; opacity: 0.8;">Connecting...</div>
    </div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
</header>

<div id="chatWindow">
  <div class="msg bot">Welcome back! I'm synchronized with the BIU Hub brain. Ask me anything.</div>
</div>

<div id="typingIndicator" class="typing">Assistant is thinking...</div>

<div id="quickActions"></div>

<form class="input-area" id="chatForm">
  <input type="text" id="userInput" placeholder="Ask about CGPA, Library, Fees..." autocomplete="off">
  <button type="submit" class="send-btn">➔</button>
</form>

<script src="brain.js"></script>

<script>
  // --- 1. CONFIG & INIT ---
  const firebaseConfig = {
    apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
    authDomain: "biu-students-hub.firebaseapp.com",
    projectId: "biu-students-hub",
    databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com",
    appId: "1:128818531382:web:190dc5688d1b9d21321c97"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const chatWindow = document.getElementById('chatWindow');
  const chatForm = document.getElementById('chatForm');
  const userInput = document.getElementById('userInput');
  const typingIndicator = document.getElementById('typingIndicator');
  const quickActions = document.getElementById('quickActions');

  let lastTopic = null;
  let memoryTimer = null;

  // --- 2. THEME TOGGLE ---
  function toggleTheme() {
    const body = document.body;
    const current = body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  }
  // Load saved theme
  if(localStorage.getItem('theme')) document.body.setAttribute('data-theme', localStorage.getItem('theme'));

  // --- 3. CONNECTION & DATA ---
  db.ref(".info/connected").on("value", (snap) => {
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    if (snap.val() === true) {
      statusDot.style.background = "#10b981";
      statusText.innerText = "Online Knowledge Brain";
    } else {
      statusDot.style.background = "#ef4444";
      statusText.innerText = "Offline Mode";
    }
  });

  db.ref('broadcast').on('value', snap => {
    const data = snap.val();
    const banner = document.getElementById('broadcastBanner');
    if (data && data.message) {
      document.getElementById('broadcastText').innerText = "📢 " + data.message;
      banner.style.display = 'block';
    } else {
      banner.style.display = 'none';
    }
  });

  async function loadSuggestions() {
    db.ref('bot_brain').limitToFirst(6).on('value', snap => {
      const data = snap.val();
      quickActions.innerHTML = '';
      if (!data) return;
      Object.keys(data).forEach(key => {
        const btn = document.createElement('div');
        btn.className = 'action-chip';
        btn.innerText = key.toUpperCase();
        btn.onclick = () => { userInput.value = key; chatForm.dispatchEvent(new Event('submit')); };
        quickActions.appendChild(btn);
      });
    });
  }

  // --- 4. BRAIN LOGIC ---
  async function getResponse(query) {
    const input = query.toLowerCase().replace(/[^\w\s]/gi, '').trim();

    // Memory Reset
    clearTimeout(memoryTimer);
    memoryTimer = setTimeout(() => { lastTopic = null; }, 120000);

    // Context Check
    if (lastTopic && typeof contextBrain !== 'undefined' && contextBrain[lastTopic]) {
      if (input.includes("where") || input.includes("location")) return contextBrain[lastTopic].location;
      if (input.includes("when") || input.includes("time") || input.includes("open")) return contextBrain[lastTopic].time;
    }

    try {
      const snap = await db.ref('bot_brain').once('value');
      const cloudBrain = snap.val() || {};
      const fullBrainData = { ...localBrain, ...cloudBrain };

      const searchList = Object.keys(fullBrainData).map(k => ({ key: k, ans: fullBrainData[k] }));
      const fuse = new Fuse(searchList, { keys: ['key'], threshold: 0.4 });
      const result = fuse.search(input);
      
      if (result.length > 0) {
        const match = result[0].item;
        lastTopic = match.key;
        // Handle Variety
        if (Array.isArray(match.ans)) {
          return match.ans[Math.floor(Math.random() * match.ans.length)];
        }
        return match.ans;
      }

      db.ref('unanswered_questions').push({ query: query, time: Date.now() });
      return "I'm not 100% sure about that yet. I've sent your question to the admin to update my brain!";

    } catch (e) {
      console.error(e);
      return "Error connecting to my brain. Please check your internet!";
    }
  }

  // --- 5. UI INTERACTION ---
  chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const query = userInput.value.trim();
    if (!query) return;

    appendMessage('user', query);
    userInput.value = '';
    typingIndicator.style.display = 'block';

    const reply = await getResponse(query);
    
    setTimeout(() => {
      typingIndicator.style.display = 'none';
      appendMessage('bot', reply);
    }, 600);
  });

  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    // Fixed string check to prevent array crashes
    const displayText = typeof text === 'string' ? text : "Error: Response format invalid.";
    div.innerHTML = displayText.replace(/\n/g, '<br>');
    chatWindow.appendChild(div);
    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
  }

  loadSuggestions();
</script>

</body>
</html>
