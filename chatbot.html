<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study AI — BIU Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #071028; --card: #0b1a3d; --accent: #6d28d9; --accent-2: #06b6d4;
      --text: #e6eef8; --muted: #9aa8bf; --glass: rgba(255,255,255,0.05);
    }
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    header {
      padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--glass);
      display: flex; align-items: center; gap: 15px;
    }
    .back-btn { color: var(--muted); text-decoration: none; font-size: 20px; }
    .status-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }

    /* Chat Area */
    #chatWindow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 14px; position: relative; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .bot { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass); }
    .user { background: linear-gradient(135deg, var(--accent), var(--accent-2)); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }

    /* Quick Actions */
    #quickActions {
      padding: 10px 20px; display: flex; gap: 8px; overflow-x: auto; 
      white-space: nowrap; scrollbar-width: none; background: rgba(7, 16, 40, 0.8);
    }
    #quickActions::-webkit-scrollbar { display: none; }
    .action-chip {
      padding: 7px 14px; background: var(--glass); border: 1px solid var(--accent);
      border-radius: 20px; color: var(--text); font-size: 12px; cursor: pointer; transition: 0.2s;
    }
    .action-chip:hover { background: var(--accent); color: white; }

    /* Input Area */
    .input-area { padding: 15px 20px; background: var(--card); border-top: 1px solid var(--glass); display: flex; gap: 10px; align-items: center; }
    input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass); border-radius: 12px; padding: 12px 15px; color: white; outline: none; }
    .send-btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 12px; color: white; cursor: pointer; font-size: 18px; }
    
    .typing { font-size: 12px; color: var(--muted); padding: 5px 20px; display: none; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">←</a>
  <div>
    <div style="font-weight: 700; display: flex; align-items: center; gap: 8px;">
      Study Assistant <div class="status-dot"></div>
    </div>
    <div style="font-size: 12px; color: var(--muted);">Hybrid Knowledge Brain</div>
  </div>
</header>

<div id="chatWindow">
  <div class="msg bot">Hello! I'm your BIU Assistant. Ask me a question or use the quick buttons below.</div>
</div>

<div id="typingIndicator" class="typing">Assistant is thinking...</div>

<div id="quickActions">
  </div>

<form class="input-area" id="chatForm">
  <input type="text" id="userInput" placeholder="Type or click a suggestion..." autocomplete="off">
  <button type="submit" class="send-btn">➔</button>
</form>

<script>
  // 1. Initialize Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
    authDomain: "biu-students-hub.firebaseapp.com",
    projectId: "biu-students-hub",
    databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com",
    appId: "1:128818531382:web:190dc5688d1b9d21321c97"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const chatWindow = document.getElementById('chatWindow');
  const chatForm = document.getElementById('chatForm');
  const userInput = document.getElementById('userInput');
  const typingIndicator = document.getElementById('typingIndicator');
  const quickActions = document.getElementById('quickActions');

  // 2. Load Quick Buttons from Firebase
  async function loadSuggestions() {
    db.ref('bot_brain').limitToFirst(6).on('value', snap => {
      const data = snap.val();
      if (!data) return;
      quickActions.innerHTML = '';
      Object.keys(data).forEach(key => {
        const btn = document.createElement('div');
        btn.className = 'action-chip';
        btn.innerText = key.toUpperCase();
        btn.onclick = () => {
          userInput.value = key;
          chatForm.dispatchEvent(new Event('submit'));
        };
        quickActions.appendChild(btn);
      });
    });
  }

  // 3. Logic: Fuzzy Search + Fallback
  async function getResponse(query) {
    const input = query.toLowerCase().trim();
    
    try {
      const snap = await db.ref('bot_brain').once('value');
      const brain = snap.val();

      if (brain) {
        const searchList = Object.keys(brain).map(k => ({ key: k, ans: brain[k] }));
        
        const fuse = new Fuse(searchList, { 
            keys: ['key'], 
            threshold: 0.4 // Tolerance for typos
        });

        const result = fuse.search(input);
        if (result.length > 0) return result[0].item.ans;
      }

      // Log if bot doesn't know the answer
      db.ref('unanswered_questions').push({ query: query, time: Date.now() });
      return "I'm still learning about that! I've sent your question to my dev team so I can answer it next time.";

    } catch (e) {
      return "My cloud brain is temporarily offline. Please check your connection!";
    }
  }

  // 4. UI Events
  chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const query = userInput.value.trim();
    if (!query) return;

    appendMessage('user', query);
    userInput.value = '';
    typingIndicator.style.display = 'block';

    const reply = await getResponse(query);
    
    setTimeout(() => {
      typingIndicator.style.display = 'none';
      appendMessage('bot', reply);
    }, 600);
  });

  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = text.replace(/\n/g, '<br>');
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  loadSuggestions();
</script>

</body>
</html>
