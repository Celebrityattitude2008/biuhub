<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study AI — BIU Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #071028; --card: #0b1a3d; --accent: #6d28d9; --accent-2: #06b6d4;
      --text: #e6eef8; --muted: #9aa8bf; --glass: rgba(255,255,255,0.05);
    }
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    header {
      padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--glass);
      display: flex; align-items: center; gap: 15px;
    }
    .back-btn { color: var(--muted); text-decoration: none; font-size: 20px; }
    .ai-status { width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }

    /* Chat Area */
    #chatWindow {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
    }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 14px; position: relative; }
    .bot { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass); }
    .user { background: linear-gradient(135deg, var(--accent), var(--accent-2)); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }

    /* Input Area */
    .input-area {
      padding: 20px; background: var(--card); border-top: 1px solid var(--glass);
      display: flex; gap: 10px; align-items: center;
    }
    input {
      flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass); border-radius: 12px;
      padding: 12px 15px; color: white; outline: none;
    }
    .send-btn {
      background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 12px;
      color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* Animation */
    .typing { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: none; }
  </style>
</head>
<body>

<header>
  <a href="/index.html" class="back-btn">←</a>
  <div>
    <div style="font-weight: 700; display: flex; align-items: center; gap: 8px;">
      Study Assistant <div class="ai-status"></div>
    </div>
    <div style="font-size: 12px; color: var(--muted);">Always active</div>
  </div>
</header>

<div id="chatWindow">
  <div class="msg bot">
    Hello! I'm your BIU Study Assistant. Ask me anything about your courses, CGPA, or campus resources!
  </div>
</div>

<div id="typingIndicator" class="typing" style="padding: 0 20px;">AI is thinking...</div>

<form class="input-area" id="chatForm">
  <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
  <button type="submit" class="send-btn">➔</button>
</form>

<script>
    // Gemini API Configuration
    const GEMINI_API_KEY = "AIzaSyDRFbO2_NPjsRVQmHVx9FUgxwnaUtoSmTg";
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
  
    const chatWindow = document.getElementById('chatWindow');
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const typingIndicator = document.getElementById('typingIndicator');
  
    // 1. Function to call the Gemini API
    async function getGeminiResponse(userPrompt) {
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{
              parts: [{ 
                text: `You are a helpful, brilliant student assistant for Benson Idahosa University (BIU) students. 
                       Answer questions about academics, campus life, and general knowledge. 
                       Keep answers concise, friendly, and academic. User says: ${userPrompt}` 
              }]
            }]
          })
        });
  
        const data = await response.json();
        
        // Safety check for API response structure
        if (data.candidates && data.candidates[0].content.parts[0].text) {
          return data.candidates[0].content.parts[0].text;
        } else {
          return "I processed that, but I couldn't formulate a response. Try rephrasing?";
        }
      } catch (error) {
        console.error("Gemini Error:", error);
        return "Connection error. Please check your internet or API key limits.";
      }
    }
  
    // 2. Handle Form Submission (Only ONE listener)
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = userInput.value.trim();
      if (!query) return;
  
      // Display user message
      appendMessage('user', query);
      userInput.value = '';
      
      // Show typing indicator
      typingIndicator.style.display = 'block';
  
      // Fetch real AI response from Gemini
      const aiResponse = await getGeminiResponse(query);
      
      // Hide indicator and show bot message
      typingIndicator.style.display = 'none';
      appendMessage('bot', aiResponse);
    });
  
    // 3. Helper to UI
    function appendMessage(role, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${role}`;
      msgDiv.innerText = text;
      chatWindow.appendChild(msgDiv);
      
      // Smooth scroll to bottom
      chatWindow.scrollTo({
        top: chatWindow.scrollHeight,
        behavior: 'smooth'
      });
    }
  </script>

</body>
</html>
