<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BIU Student Hub — My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --bg: #050b1d; 
      --card: rgba(13, 25, 48, 0.7); 
      --accent: #1e40af; 
      --accent-2: #38bdf8; 
      --muted: #94a3b8; 
      --radius: 20px;
      --danger: #f43f5e;
      --border: rgba(56, 189, 248, 0.1);
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      margin: 0; padding: 20px 20px 120px 20px;
      background: radial-gradient(circle at top right, rgba(30, 64, 175, 0.15), transparent), var(--bg);
      color: #f1f5f9;
    }

    .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

    .profile-card {
      background: var(--card); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; text-align: center;
    }

    /* Avatar & Image styles */
    .avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
    .avatar {
      width: 100%; height: 100%; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800; color: #fff;
      border: 4px solid var(--bg); box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
      background-size: cover; background-position: center;
    }

    .menu-item {
      background: var(--card); border: 1px solid var(--border);
      padding: 16px; border-radius: 16px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: 0.2s; text-decoration: none; color: inherit;
    }
    .menu-item:hover { background: rgba(255,255,255,0.05); transform: translateX(4px); }
    .menu-icon {
      width: 38px; height: 38px; border-radius: 10px; background: rgba(56, 189, 248, 0.1);
      display: flex; align-items: center; justify-content: center; color: var(--accent-2);
    }
    .menu-label { flex: 1; font-weight: 600; font-size: 14px; }

    /* Animated Upload Button */
    .file-input-label {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px; border-radius: 12px; background: rgba(56, 189, 248, 0.05);
      border: 1px dashed var(--accent-2); color: var(--accent-2);
      cursor: pointer; font-weight: 600; transition: all 0.3s ease; margin: 10px 0;
    }
    .file-input-label:hover { background: rgba(56, 189, 248, 0.15); transform: scale(1.02); }

    input, select {
      width: 100%; padding: 12px; border-radius: 12px; margin-top: 5px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; outline: none;
    }

    /* Primary Button with Animation */
    .btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      font-weight: 800; cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { 
      background: linear-gradient(90deg, var(--accent), var(--accent-2)); 
      color: #fff; 
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
      animation: glowPulse 3s infinite;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4); }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2); }
      50% { box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
      100% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2); }
    }

    .btn-danger { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.1); margin-top: 20px;}

    .section-label { font-size: 11px; font-weight: 800; color: var(--muted); margin: 20px 0 5px 5px; text-transform: uppercase; letter-spacing: 1px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
      background: rgba(5, 11, 29, 0.95); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
    }
    .nav-item { text-decoration: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; flex:1; }
    .nav-item.active { color: var(--accent-2); }
  </style>
</head>
<body>

  <div class="container">
    <div class="profile-card">
      <div class="avatar-wrapper">
        <div id="avatarEl" class="avatar"><span id="initials">??</span></div>
      </div>
      <div id="displayName" style="font-size: 20px; font-weight: 800;">Loading...</div>
      <div id="displayEmail" style="color: var(--muted); font-size: 13px;">...</div>
      <div id="verifiedBadge" style="margin-top: 10px;"></div>
    </div>

    <a id="whatsappVerifyLink" href="#" target="_blank" class="menu-item" style="border-color: #25d36633">
      <div class="menu-icon" style="color: #25d366; background: #25d36611;"><span class="material-symbols-rounded">verified</span></div>
      <div class="menu-label">Request Verification</div>
      <span class="material-symbols-rounded" style="color:#25d366">open_in_new</span>
    </a>

    <div class="section-label">Account details</div>
    <div class="menu-item" onclick="toggleEdit()">
      <div class="menu-icon"><span class="material-symbols-rounded">person</span></div>
      <div class="menu-label">Edit Personal Information</div>
      <span id="expandIcon" class="material-symbols-rounded">expand_more</span>
    </div>

    <div id="editForm" class="profile-card" style="display:none; text-align: left;">
        <label style="font-size:12px; color:var(--accent-2)">Update Profile Image</label>
        <label for="fileInput" class="file-input-label">
          <span class="material-symbols-rounded">add_a_photo</span>
          Choose Photo
        </label>
        <input type="file" id="fileInput" accept="image/*" onchange="previewImage()" style="display: none;">
        
        <div style="text-align: center;">
          <img id="imgPreview" src="" style="width:70px; height:70px; border-radius:50%; object-fit:cover; display:none; border:2px solid var(--accent-2); margin: 0 auto 10px;">
        </div>

        <label style="font-size:12px; color:var(--accent-2)">Full Name</label>
        <input id="fullName" type="text" placeholder="Your Name">
        
        <label style="font-size:12px; color:var(--accent-2); margin-top:10px; display:block">Academic Level</label>
        <select id="levelSelect">
            <option value="100">100 Level</option>
            <option value="200">200 Level</option>
            <option value="300">300 Level</option>
            <option value="400">400 Level</option>
            <option value="500">500 Level</option>
        </select>
        
        <button id="saveChangesBtn" class="btn btn-primary" style="margin-top:15px">Save Changes</button>
    </div>

    <button id="signOutBtn" class="btn btn-danger">
      <span class="material-symbols-rounded">logout</span> Logout
    </button>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="material-symbols-rounded">home</span>
      <span>Home</span>
    </a>
    <a href="pq.html" class="nav-item">
      <span class="material-symbols-rounded">folder_open</span>
      <span>Archive</span>
    </a>
    <a href="profile.html" class="nav-item active">
      <span class="material-symbols-rounded">person</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
      authDomain: "biu-students-hub.firebaseapp.com",
      projectId: "biu-students-hub",
      databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
  
    const avatarEl = document.getElementById('avatarEl');
    const initialsEl = document.getElementById('initials');
    const displayNameEl = document.getElementById('displayName');
    const displayEmailEl = document.getElementById('displayEmail');
    const verifiedBadge = document.getElementById('verifiedBadge');
    const fullNameInput = document.getElementById('fullName');
    const levelSelect = document.getElementById('levelSelect');

    let currentUser = null; 
    let base64Image = "";

    function toggleEdit() {
      const form = document.getElementById('editForm');
      const icon = document.getElementById('expandIcon');
      const isOpen = form.style.display === 'block';
      form.style.display = isOpen ? 'none' : 'block';
      icon.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    }

    function previewImage() {
      const file = document.getElementById('fileInput').files[0];
      const reader = new FileReader();
      const preview = document.getElementById('imgPreview');

      reader.onloadend = function() {
        base64Image = reader.result; 
        preview.src = base64Image;
        preview.style.display = 'block';
      }

      if (file) {
        if (file.size > 200000) { 
          alert("Image too large! Please choose one under 200KB.");
          document.getElementById('fileInput').value = "";
          return;
        }
        reader.readAsDataURL(file);
      }
    }

    function getInitials(name) {
      if (!name) return 'BI';
      const parts = name.trim().split(' ');
      if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }
  
    function loadProfile(user) {
      const userRef = db.ref(`profiles/${user.uid}`);
      
      userRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const nameToDisplay = data.fullName || 'Student';
        
        displayNameEl.textContent = nameToDisplay;
        displayEmailEl.textContent = user.email;
        fullNameInput.value = data.fullName || '';
        levelSelect.value = data.level || '100';

        const waMsg = encodeURIComponent(`Hello Admin, I'd like to verify my BIU Hub Profile.\nName: ${nameToDisplay}\nEmail: ${user.email}`);
        document.getElementById('whatsappVerifyLink').href = `https://wa.me/2347041795388?text=${waMsg}`;
    
        if (data.profilePic) {
          avatarEl.style.backgroundImage = `url('${data.profilePic}')`;
          initialsEl.textContent = '';
        } else {
          avatarEl.style.backgroundImage = 'none';
          initialsEl.textContent = getInitials(nameToDisplay);
        }
    
        if (data.verified) {
          verifiedBadge.innerHTML = `<span style="color:var(--accent-2); font-size:12px; font-weight:700;"><span class="material-symbols-rounded" style="font-size:14px; vertical-align:middle">verified</span> Verified Student</span>`;
        } else {
          verifiedBadge.innerHTML = `<span style="color:var(--muted); font-size:12px;">Account Pending Verification</span>`;
        }
      });
    }
  
    // Unified Save Function (Name, Level, and Photo)
    document.getElementById('saveChangesBtn').addEventListener('click', async () => {
      if (!currentUser) return;
      
      const btn = document.getElementById('saveChangesBtn');
      btn.innerText = "Saving...";
      btn.disabled = true;

      const updates = {
        fullName: fullNameInput.value.trim(),
        level: levelSelect.value,
      };

      if (base64Image) {
        updates.profilePic = base64Image;
      }

      try {
          await db.ref(`profiles/${currentUser.uid}`).update(updates);
          alert('Profile Updated Successfully!');
          toggleEdit();
          document.getElementById('imgPreview').style.display = 'none';
          base64Image = ""; 
      } catch (error) {
          alert("Update error: " + error.message);
      } finally {
          btn.innerText = "Save Changes";
          btn.disabled = false;
      }
    });
  
    document.getElementById('signOutBtn').addEventListener('click', () => {
      if(confirm('Log out of BIU Hub?')) {
          auth.signOut().then(() => {
              window.location.href = 'index.html';
          });
      }
    });
  
    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUser = user;
        loadProfile(user);
      } else {
        window.location.href = 'login.html'; 
      }
    });
  </script>
</body>
</html>
