<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>BIU Student Hub — App Store</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #f8f9fb;
      --card-bg: #ffffff;
      --text-main: #1a1f36;
      --text-muted: #6b7280;
      --primary: #3f19e6;
      --primary-dark: #2144b8;
      --border: #b3aaaa;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --nav-bg: #e4e4e4;
      --icon-bg: #e7e7e7;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #2013d3;
      --primary-dark: rgb(46, 26, 224);
      --border: #334155;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      --nav-bg: #1e293b;
      --icon-bg: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body { background-color: var(--bg); color: var(--text-main); transition: background 0.3s, color 0.3s; padding-bottom: 80px; }

    /* Header Section */
    .top-header {
      background: var(--primary);
      color: #ffffff;
      padding: 30px 20px 40px;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      position: relative;
    }
    
    .header-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .welcome-text { font-size: 24px; font-weight: 800; }
    .subtitle { font-family: 'Caveat', cursive; font-size: 20px; opacity: 0.9; }
    
    .theme-toggle, .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.2s; }
    
    .theme-toggle:hover, .back-btn:hover { background: rgba(255,255,255,0.3); }

    /* Section */
    .section-title { font-family: 'Caveat', cursive; font-size: 28px; padding: 25px 20px 15px; color: var(--text-main); font-weight: 700; }

    /* Search Bar */
    .search-bar {
      display: flex;
      gap: 10px;
      padding: 15px 20px;
      background: var(--card-bg);
      margin: 0 20px 15px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .search-bar input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-main);
      font-size: 14px;
      outline: none;
    }

    .search-bar input::placeholder { color: var(--text-muted); }

    /* App Cards Grid */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 0 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      .apps-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 500px) {
      .apps-grid { grid-template-columns: 1fr; }
    }

    /* App Card */
    .app-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 15px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }

    .app-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); }

    .app-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      margin-bottom: 12px;
    }

    .app-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .app-description {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .app-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stars {
      display: flex;
      gap: 2px;
    }

    .star {
      font-size: 14px;
      color: #fbbf24;
    }

    .star.empty { color: var(--icon-bg); }

    .rating-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .app-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-download {
      background: var(--primary);
      color: white;
    }

    .btn-download:hover { background: var(--primary-dark); }

    .btn-review {
      background: var(--icon-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
    }

    .btn-review:hover { background: var(--border); }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: var(--card-bg);
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
    }

    .close-btn {
      background: var(--icon-bg);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      font-size: 20px;
    }

    .close-btn:hover { background: var(--border); }

    /* Review Form */
    .review-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
      padding: 15px;
      background: var(--icon-bg);
      border-radius: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }

    .form-input, .form-textarea {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--text-main);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }

    .rating-selector {
      display: flex;
      gap: 8px;
    }

    .rating-star {
      font-size: 32px;
      cursor: pointer;
      color: #929599;
      transition: color 0.2s;
    }

    .rating-star:hover, .rating-star.selected { color: #fbbf24; }

    .form-actions {
      display: flex;
      gap: 10px;
    }

    .btn-submit {
      flex: 1;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-submit:hover { background: var(--primary-dark); }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: var(--icon-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel:hover { background: var(--border); }

    /* Reviews Section */
    .reviews-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .review-item {
      background: var(--icon-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .reviewer-info {
      flex: 1;
    }

    .reviewer-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .review-rating {
      display: flex;
      gap: 2px;
      margin-bottom: 8px;
    }

    .review-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .review-text {
      font-size: 14px;
      color: var(--text-main);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .review-actions {
      display: flex;
      gap: 15px;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .review-action-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .review-action-btn:hover { color: var(--primary); }

    .review-action-btn.helpful { color: var(--primary); font-weight: 600; }

    .helpful-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 14px;
      line-height: 1.6;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 100px;
      right: 20px;
      background: var(--primary);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: var(--shadow);
      animation: slideIn 0.3s ease-out;
      z-index: 2000;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="top-header">
    <div class="header-top-row">
      <button class="back-btn" onclick="goBack()">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <div>
        <div class="welcome-text">App Store</div>
        <div class="subtitle">Download & Rate</div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()">
        <span class="material-symbols-rounded">dark_mode</span>
      </button>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-bar">
    <span class="material-symbols-rounded" style="color: var(--text-muted);">search</span>
    <input type="text" id="searchInput" placeholder="Search apps..." onkeyup="filterApps()">
  </div>

  <!-- Section Title -->
  <div class="section-title">Available Apps</div>

  <!-- Apps Grid -->
  <div class="apps-grid" id="appsGrid"></div>

  <!-- APP Details Modal -->
  <div class="modal" id="appModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalAppName"></div>
        <button class="close-btn" onclick="closeAppModal()">✕</button>
      </div>

      <!-- App Details -->
      <div style="margin-bottom: 20px;">
        <div style="display: flex; gap: 15px; margin-bottom: 15px;">
          <div class="app-icon" id="modalAppIcon"></div>
          <div style="flex: 1;">
            <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 8px;" id="modalAppCategory"></div>
            <div style="font-size: 14px; color: var(--text-main); line-height: 1.6; margin-bottom: 10px;" id="modalAppDesc"></div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="stars" id="modalAppRating"></div>
              <span style="font-size: 12px; color: var(--text-muted);" id="modalAppReviewCount"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Review Section -->
      <div style="border-top: 1px solid var(--border); padding-top: 20px; margin-bottom: 20px;">
        <div style="font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 15px;">Write a Review</div>
        
        <div class="review-form">
          <div class="form-group">
            <label class="form-label">Your Name</label>
            <input type="text" class="form-input" id="reviewerName" placeholder="Enter your name...">
          </div>

          <div class="form-group">
            <label class="form-label">Rating</label>
            <div class="rating-selector" id="ratingSelector">
              <span class="rating-star" data-rating="1">★</span>
              <span class="rating-star" data-rating="2">★</span>
              <span class="rating-star" data-rating="3">★</span>
              <span class="rating-star" data-rating="4">★</span>
              <span class="rating-star" data-rating="5">★</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Review</label>
            <textarea class="form-textarea" id="reviewText" placeholder="Share your experience with this app..."></textarea>
          </div>

          <div class="form-actions">
            <button class="btn-submit" onclick="submitReview()">Submit Review</button>
            <button class="btn-cancel" onclick="resetReviewForm()">Clear</button>
          </div>
        </div>
      </div>

      <!-- Reviews List -->
      <div style="border-top: 1px solid var(--border); padding-top: 20px;">
        <div style="font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 15px;" id="reviewsTitle">Reviews</div>
        <div class="reviews-container" id="reviewsList"></div>
      </div>
    </div>
  </div>

  <script>
    // Initialize local storage
    let selectedRating = 0;
    let currentAppId = null;

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
      authDomain: "biu-students-hub.firebaseapp.com",
      projectId: "biu-students-hub",
      storageBucket: "biu-students-hub.firebasestorage.app",
      messagingSenderId: "128818531382",
      appId: "1:128818531382:web:190dc5688d1b9d21321c97",
      databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Sample apps data
    const apps = [
      {
        id: 1,
        name: "BIU Archive",
        category: "Education",
        description: "Access past exams, notes, and study materials from previous years.",
        icon: "📚",
        rating: 4.5,
        downloads: 0,
        downloadUrl: "https://github.com/Celebrityattitude2008/biuhub/releases/download/Biu_Archive_App/_Biu_Archive.apk",
        reviews: []
      },
      {
        id: 2,
        name: "Campus Market",
        category: "Marketplace",
        description: "Buy and sell items among students. From books to gadgets and more.",
        icon: "🛒",
        rating: 4.2,
        downloads: 0,
        downloadUrl: "https://github.com/Celebrityattitude2008/biuhub/releases/download/Campus_Market_APK/The_Campus_Market_v2.apk",
        reviews: []
      }
    ];

  function loadAppsData() {
    db.ref('appStore/apps').once('value').then(snapshot => {
      const firebaseData = snapshot.val();
      if (firebaseData) {
        apps.forEach(app => {
          const savedApp = firebaseData[app.id];
          if (savedApp) {
            // Merge Firebase data into the local app object
            app.reviews = savedApp.reviews || [];
            app.rating = parseFloat(savedApp.rating) || app.rating;
            app.downloads = parseInt(savedApp.downloads) || 0;
          }
        });
      }
      renderApps(); // Render ONLY after the loop finishes
    }).catch(error => {
      console.error('Firebase load error:', error);
      renderApps(); // Fallback to local data
    });
  }

  function saveAppsData() {
  apps.forEach(app => {
    db.ref('appStore/apps/' + app.id).update({
      reviews: app.reviews || [],
      rating: app.rating || 0,
      downloads: app.downloads || 0
    });
  });
}

    // Go back to index
    function goBack() {
      window.location.href = 'index.html';
    }

    // Render apps grid
    function renderApps(appsToShow = apps) {
      const grid = document.getElementById('appsGrid');
      grid.innerHTML = '';

      if (appsToShow.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 40px 20px;">
            <div style="font-size: 48px; margin-bottom: 10px;">🔍</div>
            <div style="color: var(--text-muted);">No apps found</div>
          </div>
        `;
        return;
      }

      appsToShow.forEach(app => {
        const ratingStars = generateStars(app.rating);
        const card = document.createElement('div');
        card.className = 'app-card';
        card.innerHTML = `
          <div class="app-icon">${app.icon}</div>
          <div class="app-name">${app.name}</div>
          <div class="app-description">${app.description}</div>
          <div style="display: flex; gap: 15px; margin-bottom: 12px; font-size: 12px;">
            <div style="display: flex; align-items: center; gap: 4px; color: var(--text-muted);">
              <span class="material-symbols-rounded" style="font-size: 14px;">download</span>
              ${app.downloads} downloads
            </div>
            <div style="display: flex; align-items: center; gap: 4px; color: var(--text-muted);">
              <span class="material-symbols-rounded" style="font-size: 14px;">star</span>
              ${app.rating.toFixed(1)}
            </div>
          </div>
          <div class="app-rating">
            <div class="stars">${ratingStars}</div>
            <span class="rating-count">(${app.reviews.length})</span>
          </div>
          <div class="app-actions">
            <button class="btn btn-download" onclick="downloadApp(${app.id})">
              <span class="material-symbols-rounded" style="font-size: 16px;">download</span>
              Download
            </button>
            <button class="btn btn-review" onclick="openAppModal(${app.id})">
              <span class="material-symbols-rounded" style="font-size: 16px;">rate_review</span>
              Review
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Generate star HTML
    function generateStars(rating) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        const filled = i <= Math.round(rating);
        stars += `<span class="star ${filled ? '' : 'empty'}">★</span>`;
      }
      return stars;
    }

    // Format date
    function formatDate(date) {
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      if (date.toDateString() === today.toDateString()) {
        return 'Today at ' + date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      } else if (date.toDateString() === yesterday.toDateString()) {
        return 'Yesterday at ' + date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      } else {
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: date.getFullYear() !== today.getFullYear() ? 'numeric' : undefined });
      }
    }

    // Open app modal
    function openAppModal(appId) {
      currentAppId = appId;
      const app = apps.find(a => a.id === appId);
      
      document.getElementById('modalAppName').textContent = app.name;
      document.getElementById('modalAppIcon').textContent = app.icon;
      document.getElementById('modalAppCategory').textContent = app.category;
      document.getElementById('modalAppDesc').textContent = app.description;
      document.getElementById('modalAppRating').innerHTML = generateStars(app.rating);
      document.getElementById('modalAppReviewCount').textContent = `${app.reviews.length} reviews`;

      selectedRating = 0;
      document.querySelectorAll('.rating-star').forEach(star => star.classList.remove('selected'));
      document.getElementById('reviewerName').value = '';
      document.getElementById('reviewText').value = '';

      renderReviews(appId);
      document.getElementById('appModal').classList.add('active');
    }

    // Close app modal
    function closeAppModal() {
      document.getElementById('appModal').classList.remove('active');
      currentAppId = null;
    }

    // Render reviews
    function renderReviews(appId) {
      const app = apps.find(a => a.id === appId);
      const reviewsList = document.getElementById('reviewsList');

      if (app.reviews.length === 0) {
        reviewsList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <div class="empty-state-text">No reviews yet. Be the first to review!</div>
          </div>
        `;
        return;
      }

      reviewsList.innerHTML = app.reviews.map((review, index) => `
        <div class="review-item">
          <div class="review-header">
            <div class="reviewer-info">
              <div class="reviewer-name">${review.name}</div>
              <div class="review-rating">${generateStars(review.rating)}</div>
              <div class="review-time">${formatDate(new Date(review.date))}</div>
            </div>
          </div>
          <div class="review-text">${review.text}</div>
          <div class="review-actions">
            <button class="review-action-btn ${review.helpful > 0 ? 'helpful' : ''}" onclick="toggleHelpful(${appId}, ${index})">
              <span class="material-symbols-rounded" style="font-size: 18px;">thumb_up</span>
              <span class="helpful-count">${review.helpful}</span>
            </button>
            <button class="review-action-btn">
              <span class="material-symbols-rounded" style="font-size: 18px;">share</span>
              Share
            </button>
          </div>
        </div>
      `).join('');
    }

function submitReview() {
    // 1. You MUST define these variables first
    const nameInput = document.getElementById('reviewerName');
    const textInput = document.getElementById('reviewText');
    
    const name = nameInput ? nameInput.value.trim() : "";
    const text = textInput ? textInput.value.trim() : "";
  
    // 2. Check for errors
    if (!name) {
      showToast('Please enter your name');
      return;
    }
    if (selectedRating === 0) {
      showToast('Please select a rating');
      return;
    }
    if (!text) {
      showToast('Please write a review');
      return;
    }
  
    // 3. Find the app
    const app = apps.find(a => a.id === currentAppId);
    if (!app) return;
  
    // 4. Create the new review object
    const newReview = {
      name: name,
      rating: selectedRating,
      text: text, // Now 'text' is defined!
      date: new Date().toISOString(),
      helpful: 0
    };
  
    // 5. Update Local Data
    if (!app.reviews) app.reviews = [];
    app.reviews.unshift(newReview);
  
    // Recalculate average rating
    const totalRating = app.reviews.reduce((sum, r) => sum + r.rating, 0);
    app.rating = totalRating / app.reviews.length;
  
    // 6. Save to Firebase
    db.ref(`appStore/apps/${currentAppId}`).update({
      reviews: app.reviews,
      rating: app.rating
    }).then(() => {
      showToast('Review submitted successfully!');
    }).catch(error => {
      console.error("Firebase error:", error);
      showToast('Saved locally, but server error occurred.');
    });
  
    // 7. Update UI
    renderApps();
    renderReviews(currentAppId);
    resetReviewForm();
    
    // Update the modal stars and count immediately
    document.getElementById('modalAppRating').innerHTML = generateStars(app.rating);
    document.getElementById('modalAppReviewCount').textContent = `${app.reviews.length} reviews`;
  }

    // Toggle helpful
    function toggleHelpful(appId, reviewIndex) {
      const app = apps.find(a => a.id === appId);
      app.reviews[reviewIndex].helpful += 1;
      saveAppsData();
      renderReviews(appId);
    }

    // Reset review form
    function resetReviewForm() {
      document.getElementById('reviewerName').value = '';
      document.getElementById('reviewText').value = '';
      selectedRating = 0;
      document.querySelectorAll('.rating-star').forEach(star => star.classList.remove('selected'));
    }

    // Filter apps
    function filterApps() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filtered = apps.filter(app => 
        app.name.toLowerCase().includes(searchTerm) || 
        app.description.toLowerCase().includes(searchTerm) ||
        app.category.toLowerCase().includes(searchTerm)
      );
      renderApps(filtered);
    }

    function downloadApp(appId) {
  const app = apps.find(a => a.id === appId);
  
  // Increment local counter
  app.downloads = (app.downloads || 0) + 1;
  
  // Update ONLY the download count in Firebase
  db.ref(`appStore/apps/${appId}/downloads`).set(app.downloads);
  
  renderApps(); 
  
  if (app.downloadUrl) {
    showToast(`Downloading ${app.name}...`);
    setTimeout(() => { window.location.href = app.downloadUrl; }, 500);
  }
}
    // Show toast notification
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Rating star selection
    document.addEventListener('DOMContentLoaded', () => {
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('rating-star')) {
          selectedRating = parseInt(e.target.dataset.rating);
          document.querySelectorAll('.rating-star').forEach((star, index) => {
            if (index < selectedRating) {
              star.classList.add('selected');
            } else {
              star.classList.remove('selected');
            }
          });
        }
      });

      loadAppsData();
      renderApps();
    });

    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    // Load theme preference
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    // Close modal on outside click
    document.getElementById('appModal').addEventListener('click', (e) => {
      if (e.target.id === 'appModal') {
        closeAppModal();
      }
    });
  </script>

</body>
