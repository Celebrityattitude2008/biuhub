<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BIU Student Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712; 
      --surface: #0f172a; 
      --accent: #8b5cf6; 
      --accent-2: #0ea5e9; 
      --muted: #94a3b8;
      --text: #f8fafc;
      --border: rgba(255, 255, 255, 0.1);
      --radius: 24px;
      --glow-color: var(--accent);
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
    
    body {
      height: 100vh;
      background-color: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* 1. The Main Frame */
    .container {
      position: relative;
      width: 1000px;
      height: 600px;
      background: transparent;
      border-radius: var(--radius);
      overflow: hidden; /* Point 1: Clips the light */
      box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8);
    }

    /* 2. The Rotating Border Beam */
    .container::before {
      content: '';
      position: absolute;
      width: 150%; height: 150%;
      top: -25%; left: -25%;
      background: conic-gradient(transparent, var(--glow-color), transparent 25%);
      animation: rotate 4s linear infinite;
      z-index: 0;
    }

    /* 3. The Solid Surface (The "Card" Background) */
    .container-inner {
      position: absolute;
      inset: 2px; /* Point 3: Thickness of the line */
      background: var(--bg);
      border-radius: inherit;
      z-index: 1;
      overflow: hidden;
    }

    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* 4. Form Sections */
    .form-container {
      position: absolute;
      top: 0; height: 100%;
      transition: all 0.6s ease-in-out;
    }

    .sign-in-container { left: 0; width: 50%; z-index: 2; }
    .sign-up-container { left: 0; width: 50%; opacity: 0; z-index: 1; }

    /* Movement Logic */
    .container.active .sign-in-container { transform: translateX(100%); opacity: 0; }
    .container.active .sign-up-container { transform: translateX(100%); opacity: 1; z-index: 5; }

    /* 5. The Centered Form "Card" Styling */
    form {
      display: flex; flex-direction: column; justify-content: center;
      height: 100%; padding: 0 50px;
      text-align: center;
    }

    .form-card {
        background: rgba(15, 23, 42, 0.4);
        padding: 35px;
        border-radius: 20px;
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
    }

    /* 6. Inputs: Dark & Transparent as requested */
    .input-group { margin-bottom: 12px; text-align: left; }
    label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block; pointer-events: none;}
    
    input, select {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: rgba(0,0,0,0.2);
      color: white; font-size: 14px; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--accent); background: rgba(255,255,255,0.02); }

    /* 7. Overlay: The Magic Slider */
    .overlay-container {
      position: absolute;
      top: 0; left: 50%; width: 50%; height: 100%;
      overflow: hidden;
      transition: transform 0.6s ease-in-out;
      z-index: 100;
    }
    .container.active .overlay-container { transform: translateX(-100%); }

    .overlay {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #FFFFFF;
      position: relative;
      left: -100%;
      height: 100%; width: 200%;
      transform: translateX(0);
      transition: transform 0.6s ease-in-out;
    }
    .container.active .overlay { transform: translateX(50%); }

    .overlay-panel {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; padding: 0 40px; text-align: center;
      top: 0; height: 100%; width: 50%;
      transition: transform 0.6s ease-in-out;
    }

    /* Positions text correctly so they don't overlap */
    .overlay-left { transform: translateX(-20%); }
    .container.active .overlay-left { transform: translateX(0); }

    .overlay-right { right: 0; transform: translateX(0); }
    .container.active .overlay-right { transform: translateX(20%); }

    /* Buttons */
    .btn {
      border-radius: 10px; border: 1px solid var(--accent);
      background-color: var(--accent); color: #FFFFFF;
      font-size: 14px; font-weight: bold; padding: 12px 45px;
      text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: 0.3s; margin-top: 10px;
    }
    .btn.ghost { background: transparent; border-color: #FFFFFF; margin-top: 20px; }
    .btn:active { transform: scale(0.95); }

    .logo-box {
      width: 50px; height: 50px; background: white; color: var(--accent);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-weight: 800; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 14px; line-height: 20px; margin-bottom: 20px; color: rgba(255,255,255,0.8); }

    /* Shake */
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    .apply-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
  </style>
</head>
<body>

  <div class="container" id="container">
    <div class="container-inner">
        
      <div class="form-container sign-up-container">
        <form id="signupForm">
          <div class="form-card">
            <h1>Create Account</h1>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Name" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPass" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn">Sign Up</button>
          </div>
        </form>
      </div>

      <div class="form-container sign-in-container">
        <form id="loginForm">
          <div class="form-card">
            <h1>Welcome Back</h1>
            <p style="color: var(--muted)">Log in to your student hub</p>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="logEmail" placeholder="you@students.biu.edu.ng" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="logPass" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
          </div>
        </form>
      </div>

      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-left">
            <div class="logo-box">BIU</div>
            <h1>Already a member?</h1>
            <p>Log in to keep connected with your campus community.</p>
            <button class="btn ghost" id="signIn">Sign In</button>
          </div>
          <div class="overlay-panel overlay-right">
            <div class="logo-box">BIU</div>
            <h1>New to the Hub?</h1>
            <p>"Excelling and Connecting." Join Benson Idahosa University's digital campus.</p>
            <button class="btn ghost" id="signUp">Join Now</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const container = document.getElementById('container');
    const signUpBtn = document.getElementById('signUp');
    const signInBtn = document.getElementById('signIn');

    signUpBtn.addEventListener('click', () => container.classList.add("active"));
    signInBtn.addEventListener('click', () => container.classList.remove("active"));

    // Live Validation Glow Logic
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('input', () => {
            if (input.value.length > 0 && !input.checkValidity()) {
                container.style.setProperty('--glow-color', 'var(--danger)');
            } else {
                container.style.setProperty('--glow-color', 'var(--accent)');
            }
        });
    });

    // Form Shake on Error
    const forms = [document.getElementById('loginForm'), document.getElementById('signupForm')];
    forms.forEach(form => {
        form.addEventListener('submit', (e) => {
            if (!form.checkValidity()) {
                e.preventDefault();
                container.classList.add('apply-shake');
                setTimeout(() => container.classList.remove('apply-shake'), 500);
            }
        });
    });
  </script>
</body>
</html>
