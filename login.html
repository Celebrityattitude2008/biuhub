<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BIU Student Hub — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --bg: #030712; 
      --surface: #0f172a; 
      --accent: #8b5cf6; 
      --accent-glow: rgba(139, 92, 246, 0.5);
      --accent-2: #0ea5e9; 
      --muted: #94a3b8;
      --text: #f8fafc;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    html, body {
      height: 100%; margin: 0; 
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(14, 165, 233, 0.1) 0%, transparent 40%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
    }

    .wrap { width: 100%; max-width: 1000px; padding: 20px; display: flex; justify-content: center; }

    .card {
      width: 100%;
      border-radius: var(--radius-lg);
      display: grid; grid-template-columns: 400px 1fr;
      background: rgba(15, 23, 42, 0.6);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      overflow: hidden;
      transform: translateY(20px); opacity: 0;
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardEnter { to { transform: translateY(0); opacity: 1; } }

    /* Left Side: Branding/Identity */
    .brand-side {
      padding: 50px; display: flex; flex-direction: column; justify-content: space-between;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.05) 0%, transparent 100%);
      border-right: 1px solid var(--border);
    }
    
    .logo-box {
      width: 56px; height: 56px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; font-size: 18px;
      box-shadow: 0 10px 25px var(--accent-glow);
    }

    .brand-side h1 { margin: 24px 0 12px; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .brand-side p { color: var(--muted); line-height: 1.6; font-size: 15px; }

    /* Right Side: Login Form */
    .form-side { padding: 50px; display: flex; flex-direction: column; justify-content: center; }
    
    .input-group { margin-bottom: 20px; }
    label { font-size: 13px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 8px; }
    
    input {
      width: 100%; padding: 14px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: rgba(0, 0, 0, 0.3);
      color: white; font-size: 15px; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }

    .btn {
      width: 100%; padding: 15px; border-radius: var(--radius-sm); border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white; font-weight: 700; font-size: 16px; cursor: pointer;
      transition: 0.3s; margin-top: 10px;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); margin-top: 0; padding: 10px;}

    .google-btn {
      width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none;
      background: white; color: #0f172a; font-weight: 700; display: flex; 
      align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-top: 15px;
    }

    .divider { display: flex; align-items: center; color: var(--muted); font-size: 12px; margin: 25px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); margin: 0 10px; }

    /* Success/Profile Preview */
    .signed-preview {
      display: none; padding: 16px; background: rgba(16, 185, 129, 0.1); 
      border: 1px solid rgba(16, 185, 129, 0.2); border-radius: var(--radius-sm);
      margin-bottom: 20px; animation: slideDown 0.4s ease;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } }

    .footer-link { text-align: center; margin-top: 30px; font-size: 14px; color: var(--muted); }
    .footer-link a { color: var(--accent-2); text-decoration: none; font-weight: 700; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .card { grid-template-columns: 1fr; max-width: 500px; }
      .brand-side { padding: 40px; border-right: none; border-bottom: 1px solid var(--border); text-align: center; }
      .logo-box { margin: 0 auto; }
      .form-side { padding: 40px; }
    }
    @media (max-width: 480px) {
      .wrap { padding: 10px; }
      .card { border-radius: 0; border: none; }
      .brand-side, .form-side { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="card">
      <section class="brand-side">
        <div>
          <div class="logo-box">BIU</div>
          <h1>Welcome Back</h1>
          <p>Login to access your academic resources, leaderboards, and connect with the BIU community.</p>
        </div>
        <div class="footer-link" style="text-align: left; margin-top: 40px;">
          New student? <a href="/signup.html">Create an account</a>
        </div>
      </section>

      <section class="form-side">
        <div id="signedPreview" class="signed-preview">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="previewAvatar" style="width: 40px; height: 40px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800;"></div>
            <div>
              <div id="previewName" style="font-weight: 700; font-size: 14px;"></div>
              <div id="previewEmail" style="font-size: 12px; color: var(--muted);"></div>
            </div>
          </div>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@students.biu.edu.ng" required>
          </div>
          
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>

          <div id="feedback" style="margin-bottom: 15px;"></div>

          <button type="submit" class="btn" id="signInBtn">Sign In</button>
          
          <div class="divider">OR</div>

          <button type="button" class="google-btn" id="googleSignIn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign in with Google
          </button>

          <div style="margin-top: 20px; display: flex; justify-content: center;">
            <button type="button" class="btn ghost" id="resetBtn">Forgot password?</button>
          </div>
        </form>
      </section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
      authDomain: "biu-students-hub.firebaseapp.com",
      projectId: "biu-students-hub",
      databaseURL: "https://biu-students-hub-default-rtdb.firebaseio.com",
      appId: "1:128818531382:web:190dc5688d1b9d21321c97"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const loginForm = document.getElementById('loginForm');
    const signInBtn = document.getElementById('signInBtn');
    const feedback = document.getElementById('feedback');

    // Login Function (EMAIL VERIFICATION REMOVED)
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      signInBtn.disabled = true;
      signInBtn.textContent = 'Verifying...';
      feedback.innerHTML = '';

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const user = cred.user;

        // Fetch profile data
        const snap = await db.ref('profiles/' + user.uid).once('value');
        const profile = snap.val() || {};

        // UI Feedback
        document.getElementById('previewName').textContent = profile.fullName || 'Student';
        document.getElementById('previewEmail').textContent = user.email;
        document.getElementById('previewAvatar').textContent = (profile.fullName || 'S').charAt(0);
        document.getElementById('signedPreview').style.display = 'block';

        // Redirect
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (err) {
        feedback.innerHTML = `<span style="color:var(--danger); font-size:12px;">${err.message}</span>`;
        signInBtn.disabled = false;
        signInBtn.textContent = 'Sign In';
      }
    });

    // Google Sign In
    document.getElementById('googleSignIn').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        const ref = db.ref('profiles/' + user.uid);
        const snap = await ref.once('value');
        
        if (!snap.exists()) {
          await ref.set({
            fullName: user.displayName,
            email: user.email,
            level: '100L',
            verified: false,
            createdAt: Date.now()
          });
        }
        window.location.href = '/index.html';
      } catch (err) {
        alert(err.message);
      }
    });

    // Password Reset
    document.getElementById('resetBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        feedback.innerHTML = `<span style="color:var(--accent-2); font-size:12px;">Enter email above first.</span>`;
        return;
      }
      try {
        await auth.sendPasswordResetEmail(email);
        feedback.innerHTML = `<span style="color:var(--success); font-size:12px;">Reset link sent to inbox!</span>`;
      } catch (err) {
        feedback.innerHTML = `<span style="color:var(--danger); font-size:12px;">${err.message}</span>`;
      }
    });
  </script>
</body>
</html>
