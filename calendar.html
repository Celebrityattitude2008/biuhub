<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>BIU Student Hub — Scheduler</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

  <style>
    :root {
      --bg: #f8f9fb;
      --card-bg: #ffffff;
      --text-main: #1a1f36;
      --text-muted: #6b7280;
      --primary: #0017e4;
      --border: #e5e7eb;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --icon-bg: #f3f4f6;
      --evt-assignment: #3b82f6;
      --evt-exam: #ef4444;
      --evt-personal: #f59e0b;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #02338f;
      --border: #334155;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      --icon-bg: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); color: var(--text-main); transition: background 0.3s, color 0.3s; padding-bottom: 100px; }

    .top-header {
      background: var(--primary); color: #ffffff; padding: 30px 20px 40px;
      border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
    }
    .header-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .welcome-text { font-size: 24px; font-weight: 800; }
    .subtitle { font-family: 'Caveat', cursive; font-size: 20px; opacity: 0.9; }
    
    .header-actions { display: flex; gap: 10px; }
    .theme-toggle, .test-btn { 
      background: rgba(255,255,255,0.2); border: none; color: white; 
      width: 40px; height: 40px; border-radius: 50%; display: flex; 
      align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); 
    }
    .test-btn { background: #ef4444; } /* Red for the test button */

    .calendar-container {
      background: var(--card-bg); margin: -25px 20px 20px; border-radius: 20px;
      box-shadow: var(--shadow); padding: 20px; border: 1px solid var(--border);
      position: relative; z-index: 10;
    }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .cal-month { font-size: 18px; font-weight: 800; color: var(--text-main); }
    .cal-nav-btn { background: var(--icon-bg); border: none; color: var(--text-main); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; border-radius: 12px; cursor: pointer; position: relative;
      color: var(--text-main); transition: all 0.2s;
    }
    .cal-day:hover { background: var(--icon-bg); }
    .cal-day.empty { cursor: default; }
    .cal-day.today { color: var(--primary); font-weight: 800; border: 1px solid var(--primary); }
    .cal-day.selected { background: var(--primary); color: #fff; border: none; }
    
    .evt-dots { display: flex; gap: 2px; position: absolute; bottom: 4px; }
    .dot { width: 4px; height: 4px; border-radius: 50%; }

    .events-section { padding: 0 20px; }
    .section-title { font-family: 'Caveat', cursive; font-size: 26px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
    .add-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 12px; font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    
    .event-list { display: flex; flex-direction: column; gap: 12px; }
    .event-card { background: var(--card-bg); border-left: 4px solid var(--primary); padding: 15px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
    .event-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .event-time { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .delete-evt { color: #ef4444; background: none; border: none; cursor: pointer; padding: 5px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: #fff;
      display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1); border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 100;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 10px; font-weight: 600; }
    .nav-item.active { color: #fff; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal-content { background: var(--card-bg); width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; position: relative; }
    .modal-close { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-muted); background: var(--icon-bg); border-radius: 50%; padding: 4px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--icon-bg); color: var(--text-main); }
    .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="header-top-row">
      <div>
        <div class="welcome-text">Scheduler</div>
        <div class="subtitle">Organize assignments & deadlines</div>
      </div>
      <div class="header-actions">
        <button class="test-btn" onclick="testNotification()" title="Test Signal">
          <span class="material-symbols-rounded">notifications_active</span>
        </button>
        <button class="theme-toggle" onclick="toggleTheme()">
          <span class="material-symbols-rounded" id="themeIcon">dark_mode</span>
        </button>
      </div>
    </div>
  </header>

  <div class="calendar-container">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="changeMonth(-1)"><span class="material-symbols-rounded">chevron_left</span></button>
      <div class="cal-month" id="monthDisplay">Loading...</div>
      <button class="cal-nav-btn" onclick="changeMonth(1)"><span class="material-symbols-rounded">chevron_right</span></button>
    </div>
    <div class="cal-weekdays">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div class="cal-days" id="calendarDays"></div>
  </div>

  <div class="events-section">
    <div class="section-title">
      <span id="selectedDateDisplay">Today's Tasks</span>
      <button class="add-btn" onclick="openEventModal()">
        <span class="material-symbols-rounded" style="font-size:16px;">add</span> Add
      </button>
    </div>
    <div class="event-list" id="eventList">
      <div style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:20px;">Loading schedule...</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/index.html" class="nav-item">
      <span class="material-symbols-rounded">home</span>
      <span>Home</span>
    </a>
    <a href="/assignment.html" class="nav-item">
      <span class="material-symbols-rounded">assignment</span>
      <span>Assignment</span>
    </a>
    <a href="/subscriptions.html" class="nav-item">
      <span class="material-symbols-rounded">account_balance_wallet</span>
      <span>Budget</span>
    </a>
    <a href="/calendar.html" class="nav-item active">
      <span class="material-symbols-rounded">calendar_month</span>
      <span>Schedule</span>
    </a>
    <a href="/profile.html" class="nav-item">
      <span class="material-symbols-rounded">person</span>
      <span>Profile</span>
    </a>
  </nav>

  <div class="modal-overlay" id="eventModal">
    <div class="modal-content">
      <span class="material-symbols-rounded modal-close" onclick="closeEventModal()">close</span>
      <h2 style="margin-bottom: 20px; font-size:20px;">New Schedule</h2>
      <div class="form-group">
        <label>Task Title</label>
        <input type="text" id="evtTitle" placeholder="e.g. MTH101 Assignment" required>
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="evtTime" required>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="evtType">
          <option value="assignment">Assignment</option>
          <option value="exam">Exam / Test</option>
          <option value="personal">Personal / Meeting</option>
        </select>
      </div>
      <button class="btn-primary" onclick="saveEvent()">Save Task</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // --- Theme Logic ---
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';
    }
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      document.getElementById('themeIcon').textContent = newTheme === 'dark' ? 'light_mode' : 'dark_mode';
    }
    initTheme();

    // --- Service Worker Logic ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('✅ Service Worker Registered');
      }).catch(err => console.log('❌ SW Error:', err));
    }

    // --- TEST NOTIFICATION FUNCTION ---
    function testNotification() {
      console.log("🔔 Test Button Clicked...");
      
      if (!("Notification" in window)) {
        alert("This browser does not support notifications.");
        return;
      }

      Notification.requestPermission().then(permission => {
        console.log("Current Permission:", permission);
        
        if (permission === "granted") {
          navigator.serviceWorker.ready.then(registration => {
            console.log("🚀 Service Worker Ready. Showing alert...");
            registration.showNotification("BIU HUB: Test Success!", {
              body: "Your phone is now connected for schedule alerts! 🚀",
              vibrate: [200, 100, 200, 100, 200],
              tag: 'test-notification'
            });
          }).catch(err => {
            alert("SW not ready. Refresh and wait 3 seconds.");
            console.error(err);
          });
        } else {
          alert("Permission Denied. Please enable notifications in browser settings.");
        }
      });
    }

    // --- Firebase Init ---
    const firebaseConfig = {
      apiKey: "AIzaSyBsVbLw4mvFTJhmORUXCUNyGc98Rripj3M",
      authDomain: "biu-students-hub.firebaseapp.com",
      projectId: "biu-students-hub",
      storageBucket: "biu-students-hub.firebasestorage.app",
      messagingSenderId: "128818531382",
      appId: "1:128818531382:web:190dc5688d1b9d21321c97"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let currentUser = null;

    let currentDate = new Date();
    let selectedDate = new Date();
    let eventsData = {}; 
    const colorMap = { 'assignment': 'var(--evt-assignment)', 'exam': 'var(--evt-exam)', 'personal': 'var(--evt-personal)' };

    auth.onAuthStateChanged(user => {
      if (!user) { window.location.href = '/login.html'; } 
      else { 
        currentUser = user; 
        fetchEvents();
        // Request notification permission immediately
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      }
    });

    // Background Monitor - Check every 30 seconds for better accuracy
    setInterval(() => {
      if (!currentUser) return;
      
      const now = new Date();
      const dateKey = formatDateStr(now.getFullYear(), now.getMonth(), now.getDate());
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const currentTime = `${hours}:${minutes}`;

      if (eventsData[dateKey]) {
        Object.entries(eventsData[dateKey]).forEach(([id, evt]) => {
          if (evt.time === currentTime && !evt.notified) {
            console.log(`📅 Notification triggered for: ${evt.title}`);
            triggerSystemNotification(evt.title, formatAMPM(evt.time));
            // Mark event as notified
            db.ref(`profiles/${currentUser.uid}/schedule/${dateKey}/${id}`).update({ notified: true }).catch(err => {
              console.error('Failed to update notification status:', err);
            });
          }
        });
      }
    }, 30000);

    function triggerSystemNotification(title, time) {
      if ("Notification" in window && Notification.permission === "granted") {
        navigator.serviceWorker.ready
          .then(reg => {
            reg.showNotification("⏰ Schedule Reminder", {
              body: `${title} at ${time}`,
              icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230017e4'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z'/></svg>",
              vibrate: [200, 100, 200, 100, 200],
              tag: 'task-alert',
              requireInteraction: true
            });
            console.log(`✅ Notification sent for: ${title}`);
          })
          .catch(err => {
            console.error('Service Worker notification failed:', err);
            // Fallback: show browser alert
            alert(`⏰ Task Reminder\n${title} at ${time}`);
          });
      } else if ("Notification" in window && Notification.permission === "default") {
        // Permission not requested yet, ask for it
        Notification.requestPermission().then(permission => {
          if (permission === "granted") {
            triggerSystemNotification(title, time);
          } else {
            console.warn('Notification permission denied');
          }
        });
      } else {
        // Fallback: browser alert
        console.warn('Notifications not available, using alert fallback');
        alert(`⏰ Task Reminder\n${title} at ${time}`);
      }
    }

    // --- Calendar Rendering ---
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = new Date();
      document.getElementById('monthDisplay').textContent = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const calendarDays = document.getElementById('calendarDays');
      calendarDays.innerHTML = '';
      for (let i = 0; i < firstDay; i++) { calendarDays.innerHTML += `<div class="cal-day empty"></div>`; }
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = formatDateStr(year, month, day);
        let classes = 'cal-day';
        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) classes += ' today';
        if (dateStr === formatDateStr(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate())) classes += ' selected';
        let dotsHtml = '<div class="evt-dots">';
        if (eventsData[dateStr]) {
            const types = new Set(Object.values(eventsData[dateStr]).map(e => e.type));
            types.forEach(type => { dotsHtml += `<div class="dot" style="background:${colorMap[type]}"></div>`; });
        }
        dotsHtml += '</div>';
        calendarDays.innerHTML += `<div class="${classes}" onclick="selectDate(${year}, ${month}, ${day})">${day}${dotsHtml}</div>`;
      }
    }

    function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
    function selectDate(year, month, day) {
      selectedDate = new Date(year, month, day);
      document.getElementById('selectedDateDisplay').textContent = selectedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      renderCalendar();
      renderEventsList();
    }
    function formatDateStr(year, month, day) { return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`; }

    async function fetchEvents() {
      const ref = db.ref(`profiles/${currentUser.uid}/schedule`);
      ref.on('value', (snapshot) => {
        eventsData = snapshot.val() || {};
        renderCalendar();
        selectDate(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate());
      });
    }

    function renderEventsList() {
      const list = document.getElementById('eventList');
      const dateKey = formatDateStr(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate());
      const todaysEvents = eventsData[dateKey];
      list.innerHTML = '';
      if (!todaysEvents || Object.keys(todaysEvents).length === 0) {
        list.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:20px; font-family:'Caveat', cursive; font-size:18px;">No tasks for this day.</div>`;
        return;
      }
      const eventsArr = Object.entries(todaysEvents).map(([id, data]) => ({ id, ...data }));
      eventsArr.sort((a, b) => a.time.localeCompare(b.time));
      eventsArr.forEach(evt => {
        list.innerHTML += `
          <div class="event-card" style="border-left-color: ${colorMap[evt.type]}">
            <div>
              <div class="event-title">${evt.title}</div>
              <div class="event-time"><span class="material-symbols-rounded" style="font-size:14px;">schedule</span> ${formatAMPM(evt.time)} • ${evt.type}</div>
            </div>
            <button class="delete-evt" onclick="deleteEvent('${dateKey}', '${evt.id}')"><span class="material-symbols-rounded">delete</span></button>
          </div>`;
      });
    }

    function formatAMPM(time24) {
      if(!time24) return "";
      let [h, m] = time24.split(':');
      h = parseInt(h);
      return `${h % 12 || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function openEventModal() { document.getElementById('eventModal').style.display = 'flex'; }
    function closeEventModal() { document.getElementById('eventModal').style.display = 'none'; }
    async function saveEvent() {
      const title = document.getElementById('evtTitle').value.trim();
      const time = document.getElementById('evtTime').value;
      const type = document.getElementById('evtType').value;
      if(!title || !time) return alert("Fill all fields");
      const dateKey = formatDateStr(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate());
      try {
        await db.ref(`profiles/${currentUser.uid}/schedule/${dateKey}`).push({ 
          title, 
          time, 
          type, 
          notified: false,
          createdAt: Date.now()
        });
        console.log(`✅ Event saved: ${title} at ${time}`);
        // Clear form
        document.getElementById('evtTitle').value = '';
        document.getElementById('evtTime').value = '';
        closeEventModal();
      } catch (err) {
        console.error('Failed to save event:', err);
        alert('Failed to save event. Please try again.');
      }
    }
    async function deleteEvent(d, i) { if(confirm("Delete?")) await db.ref(`profiles/${currentUser.uid}/schedule/${d}/${i}`).remove(); }
  </script>
</body>
</html>
